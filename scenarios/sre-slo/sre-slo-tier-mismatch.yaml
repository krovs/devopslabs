id: sreSloTierMismatch
kind: sre
title: SLO Tier Mismatch
description: A tier-1 service inherits a tier-3 SLO; tighten the tier, availability target, and error budget policy.
primaryFile: slo.json
tips:
  - checkout-api is a tier-1 user-facing service.
  - It currently inherits a tier-3 SLO.
  - Tier-1 requires 99.95% availability.
  - The error budget policy must be strict for tier-1.
files:
  "slo.json": |
    {
      "service": "checkout-api",
      "tier": 3,
      "availabilityTarget": 99.0,
      "errorBudgetPolicy": "lenient"
    }
  "tier-matrix.txt": |
    service: checkout-api
    declaredTier: 1
    currentTier: 3 (mismatch)
    tier1Availability: 99.95
    tier1ErrorBudgetPolicy: strict
solution:
  summary: |
    A tier-1 service is using a tier-3 SLO. Set the tier to 1, the availability target to 99.95, and the error budget policy to strict.
  steps:
    - Set tier to 1 to match the declared service tier.
    - Set availabilityTarget to 99.95 for tier-1.
    - Set errorBudgetPolicy to strict for tier-1.
  explanation: |
    SLO tiers encode how important a service is. A tier-1 user-facing service needs a tighter availability target and a strict error budget policy so burns are acted on, unlike the lenient tier-3 defaults.
  outcome: |
    checkout-api has tier 1, 99.95% availability, and a strict error budget policy.
  focusFileName: slo.json
  replacements:
    - fileName: slo.json
      search: '"tier": 3,'
      replace: '"tier": 1,'
    - fileName: slo.json
      search: '"availabilityTarget": 99.0,'
      replace: '"availabilityTarget": 99.95,'
    - fileName: slo.json
      search: '"errorBudgetPolicy": "lenient"'
      replace: '"errorBudgetPolicy": "strict"'
  commands:
    - sre validate
backend:
  bucket: sre-slo
  key: slo-tier-mismatch
  table: none
  locked: false
  lockId: null
awsResources:
  - type: slo
    name: checkout-api-slo
    id: checkout-api-slo
    status: failed
    note: Tier-1 service inherits tier-3 SLO with 99.0% target and lenient policy.
stateResources:
  - address: slo.tier
    id: "3"
  - address: slo.availabilityTarget
    id: "99.0"
flags:
  sreValidated: false
