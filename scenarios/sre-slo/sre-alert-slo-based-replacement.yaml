id: sreAlertSloBasedReplacement
kind: sre
title: Alert SLO-Based Replacement
description: Replace a CPU threshold alert with an SLO burn-rate alert that maps user impact to burn rate.
primaryFile: alert.json
tips:
  - Run promtool check rules checkout-api-capacity to see the current alert.
  - The current alert is a CPU threshold that does not map to user impact.
  - Replace it with an SLO burn-rate alert.
  - Set alertType to slo-burn.
  - Remove the CPU threshold and set the SLO burn rate to 14.4.
files:
  "alert.json": |
    {
      "alert": "checkout-api-capacity",
      "alertType": "cpu-threshold",
      "cpuThreshold": 90,
      "sloBurnRate": 0
    }
  "alert-review.txt": |
    alert: checkout-api-capacity
    currentType: cpu-threshold
    problem: CPU does not map to user impact
    replacement: slo-burn with burn rate 14.4
solution:
  summary: |
    The CPU threshold alert does not reflect user impact. Replace it with an SLO burn-rate alert.
  steps:
    - Change alertType from cpu-threshold to slo-burn.
    - Remove the CPU threshold by setting it to 0.
    - Set the SLO burn rate to 14.4.
  explanation: |
    CPU threshold alerts fire on resource use that may not affect users. SLO burn-rate alerts fire when reliability budget is actually burning, so pages map to real user impact.
  outcome: |
    The alert is an SLO burn-rate alert with burn rate 14.4 and no CPU threshold.
  focusFileName: alert.json
  replacements:
    - fileName: alert.json
      search: '"alertType": "cpu-threshold",'
      replace: '"alertType": "slo-burn",'
    - fileName: alert.json
      search: '"cpuThreshold": 90,'
      replace: '"cpuThreshold": 0,'
    - fileName: alert.json
      search: '"sloBurnRate": 0'
      replace: '"sloBurnRate": 14.4'
  commands:
    - promtool check rules checkout-api-capacity
    - check
backend:
  bucket: sre-slo
  key: alert-slo-based-replacement
  table: none
  locked: false
  lockId: null
awsResources:
  - type: alert
    name: checkout-api-capacity
    id: checkout-api-capacity
    status: failed
    note: Alert is a CPU threshold that does not map to user impact.
stateResources:
  - address: alert.alertType
    id: cpu-threshold
  - address: alert.cpuThreshold
    id: "90"
flags:
  sreValidated: false
