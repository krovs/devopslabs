id: incidentRunbookExecutionGap
kind: incident
title: Runbook Execution Gap
description: On-call follows a stale runbook whose steps diverge from the live service port; flag the drift and patch the runbook.
primaryFile: runbook.yaml
tips:
  - The runbook says the service listens on port 9090.
  - The live checkout-api service listens on port 8080.
  - Update the runbook port to match the live service.
files:
  "runbook.yaml": |
    service: checkout-api
    port: 9090
    healthCheck: /healthz
    restartCommand: sudo systemctl restart checkout-api
  "live-service.txt": |
    service: checkout-api
    listeningPort: 8080
    healthCheck: /healthz
solution:
  summary: |
    The runbook is stale: it points at port 9090 while checkout-api now listens on 8080. Update the runbook port to match the live service.
  steps:
    - Compare the runbook port against the live service listening port.
    - The runbook says 9090 but the service listens on 8080.
    - Update the runbook port to 8080.
  explanation: |
    Runbooks drift when services change and the documentation is not updated. Executing a stale runbook during an incident wastes time and can worsen impact, so the runbook port must match the live service.
  outcome: |
    The runbook points at port 8080 and matches the live checkout-api service.
  focusFileName: runbook.yaml
  replacements:
    - fileName: runbook.yaml
      search: |
        port: 9090
      replace: |
        port: 8080
  commands:
    - incident validate
backend:
  bucket: incident-response
  key: runbook-execution-gap
  table: none
  locked: false
  lockId: null
awsResources:
  - type: runbook
    name: checkout-api-runbook
    id: checkout-api-runbook
    status: drifted
    note: Runbook port 9090 does not match the live service port 8080.
stateResources:
  - address: runbook.port
    id: "9090"
  - address: service.port
    id: "8080"
flags:
  incidentValidated: false
