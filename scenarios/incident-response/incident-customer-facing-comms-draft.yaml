id: incidentCustomerFacingCommsDraft
kind: incident
title: Customer-Facing Status Comms
description: Draft status page updates at t+0, t+15, and t+60 that balance transparency with SLA wording.
primaryFile: status-update.json
tips:
  - Run statuspage incident show INC-2041 to see the current status page.
  - A status page needs updates at t+0, t+15, and t+60.
  - t+0 acknowledges the incident and impact.
  - t+15 shares the investigation status.
  - t+60 shares the mitigation and resolution path.
  - Each update must state the impact: checkout API errors for 12% of orders.
files:
  "status-update.json": |
    {
      "incidentId": "INC-2041",
      "updates": []
    }
  "comms-policy.txt": |
    policy: balance transparency with SLA wording.
    requiredImpact: impact: checkout API errors for 12% of orders.
    cadence: t+0 acknowledge, t+15 investigating, t+60 mitigated.
solution:
  summary: |
    The status page has no updates. Draft the t+0, t+15, and t+60 updates with the required impact wording.
  steps:
    - Run statuspage incident show INC-2041 to see the current status page.
    - Add a t+0 update acknowledging the incident and stating the impact.
    - Add a t+15 update sharing the investigation status.
    - Add a t+60 update sharing the mitigation and resolution path.
    - Each update must include the impact wording.
    - Run statuspage incident show INC-2041 again to confirm.
  explanation: |
    Customer-facing comms during an incident need a regular cadence with honest impact wording. The t+0 acknowledges, t+15 updates on investigation, and t+60 reports mitigation, all carrying the same impact statement so customers see consistency.
  outcome: |
    The status page has t+0, t+15, and t+60 updates with the required impact wording.
  focusFileName: status-update.json
  replacements:
    - fileName: status-update.json
      search: |
        "updates": []
      replace: |
        "updates": [
          { "time": "t+0", "message": "We are investigating checkout failures. impact: checkout API errors for 12% of orders." },
          { "time": "t+15", "message": "Root cause identified, mitigation in progress. impact: checkout API errors for 12% of orders." },
          { "time": "t+60", "message": "Mitigated, monitoring recovery. impact: checkout API errors for 12% of orders." }
        ]
  commands:
    - statuspage incident show INC-2041
    - check
backend:
  bucket: incident-response
  key: customer-facing-comms
  table: none
  locked: false
  lockId: null
awsResources:
  - type: status_page
    name: INC-2041-status
    id: INC-2041-status
    status: failed
    note: Status page has no updates for the active incident.
stateResources:
  - address: status.updates
    id: empty
flags:
  incidentValidated: false
