id: incidentPostmortemBlameless
kind: incident
title: Blameless Postmortem Draft
description: Draft a blameless postmortem from a raw incident timeline: fill the root cause and action items and remove blame language.
primaryFile: postmortem.md
tips:
  - A blameless postmortem never names a person as the cause.
  - Fill the root cause with the technical failure mode.
  - Add concrete action items that would prevent recurrence.
  - Remove any "Caused by dev" blame language.
files:
  "postmortem.md": |
    # Postmortem INC-2041

    service: checkout-api
    impact: 12% of orders failed for 23 minutes.

    rootCause:
    actionItems:
    blame: Caused by dev pushing bad code without review.
solution:
  summary: |
    The postmortem is missing the root cause and action items and contains blame language. Fill the technical root cause, add action items, and remove the blame line.
  steps:
    - Replace the empty rootCause with the technical failure mode.
    - Add concrete action items: canary gate, DB migration review, rollback runbook.
    - Remove the blame line that names the developer.
  explanation: |
    Blameless postmortems focus on systemic causes and guardrails, not individuals. The root cause was a bad migration deployed without a canary, so the action items target canary deployment, migration review, and rollback readiness.
  outcome: |
    The postmortem documents a technical root cause with preventive action items and no blame language.
  focusFileName: postmortem.md
  replacements:
    - fileName: postmortem.md
      search: |
        rootCause:
        actionItems:
        blame: Caused by dev pushing bad code without review.
      replace: |
        rootCause: bad migration deployed without canary deploy.
        actionItems: add canary gate, require DB migration review, add rollback runbook.
  commands:
    - incident validate
backend:
  bucket: incident-response
  key: inc-2041-postmortem
  table: none
  locked: false
  lockId: null
awsResources:
  - type: postmortem
    name: INC-2041
    id: INC-2041-postmortem
    status: failed
    note: Postmortem has no root cause, no action items, and contains blame language.
stateResources:
  - address: postmortem.rootCause
    id: empty
  - address: postmortem.blame
    id: present
flags:
  incidentValidated: false
