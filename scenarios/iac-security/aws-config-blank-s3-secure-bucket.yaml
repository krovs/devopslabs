id: awsConfigBlankS3SecureBucket
kind: awsconfig
title: IaC Security Baselines Blank S3 Secure Bucket
description: Build a secure S3 bucket Terraform configuration from an empty file.
primaryFile: main.tf
tips:
  - Start with the bucket, then add the guardrail resources.
  - The lab expects encryption, versioning, and public access block.
  - Use Checkov before running plan.
files:
  "main.tf": |
    # Start here.
  "requirements.md": |
    Build Terraform for:
    - aws_s3_bucket named secure_logs
    - aws_s3_bucket_server_side_encryption_configuration
    - aws_s3_bucket_versioning with status = "Enabled"
    - aws_s3_bucket_public_access_block
solution:
  summary: |
    Build a secure S3 bucket Terraform configuration from an empty file.
  steps:
    - Start with the bucket, then add the guardrail resources.
    - The lab expects encryption, versioning, and public access block.
    - Use Checkov before running plan.
  explanation: |
    Build a secure S3 bucket Terraform configuration from an empty file.
    
    The Terraform configuration now includes the missing security baseline and the simulated Checkov gate can pass. The solved path covers initialization, security scanning, and planning.
    
    Operationally, this matters because cloud guardrails are reviewed before deployment instead of being discovered after resources are already live.
  outcome: |
    IaC Security Baselines Blank S3 Secure Bucket: The Terraform configuration now includes the missing security baseline and the simulated Checkov gate can pass.
  focusFileName: main.tf
  files:
    "main.tf": |
      provider "aws" {
        region = "eu-west-1"
      }
      
      resource "aws_s3_bucket" "secure_logs" {
        bucket = "secure-logs"
      }
      
      resource "aws_s3_bucket_server_side_encryption_configuration" "secure_logs" {
        bucket = aws_s3_bucket.secure_logs.id
      
        rule {
          apply_server_side_encryption_by_default {
            sse_algorithm = "AES256"
          }
        }
      }
      
      resource "aws_s3_bucket_versioning" "secure_logs" {
        bucket = aws_s3_bucket.secure_logs.id
      
        versioning_configuration {
          status = "Enabled"
        }
      }
      
      resource "aws_s3_bucket_public_access_block" "secure_logs" {
        bucket                  = aws_s3_bucket.secure_logs.id
        block_public_acls       = true
        block_public_policy     = true
        ignore_public_acls      = true
        restrict_public_buckets = true
      }
  commands:
    - terraform init
    - checkov -f main.tf
    - terraform plan
backend:
  bucket: aws-config-training
  key: blank-s3-secure-bucket
  table: tf-locks
  locked: false
  lockId: null
awsResources:
  - type: s3_bucket
    name: secure-logs-training
    id: secure-logs-training
    status: failed
    note: Blank Terraform file has not defined the secure bucket guardrails.
stateResources: []
flags:
  initialized: false
  securityPassed: false
  cleanPlan: false
  configValidated: false
