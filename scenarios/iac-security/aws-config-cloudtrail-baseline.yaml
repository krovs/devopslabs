id: awsConfigCloudTrailBaseline
kind: awsconfig
title: IaC Security Baselines CloudTrail Baseline
description: A governance trail exists but does not cover every region or log file validation.
primaryFile: main.tf
tips:
  - A governance trail should be multi-region.
  - Log file validation helps detect tampering.
  - Global service events should be included.
files:
  "main.tf": |
    provider "aws" {
      region = "eu-west-1"
    }

    resource "aws_cloudtrail" "governance" {
      name                          = "org-governance"
      s3_bucket_name                = "org-cloudtrail-logs"
      is_multi_region_trail         = false
      include_global_service_events = false
      enable_log_file_validation    = false
    }
solution:
  summary: |
    A governance trail exists but does not cover every region or log file validation.
  steps:
    - A governance trail should be multi-region.
    - Log file validation helps detect tampering.
    - Global service events should be included.
  explanation: |
    A governance trail exists but does not cover every region or log file validation.
    
    The Terraform configuration now includes the missing security baseline and the simulated Checkov gate can pass. The solved path covers initialization, security scanning, and planning.
    
    Operationally, this matters because cloud guardrails are reviewed before deployment instead of being discovered after resources are already live.
  outcome: |
    IaC Security Baselines CloudTrail Baseline: The Terraform configuration now includes the missing security baseline and the simulated Checkov gate can pass.
  focusFileName: main.tf
  replacements:
    - fileName: main.tf
      search: |
        is_multi_region_trail         = false
      replace: |
        is_multi_region_trail         = true
    - fileName: main.tf
      search: |
        include_global_service_events = false
      replace: |
        include_global_service_events = true
    - fileName: main.tf
      search: |
        enable_log_file_validation    = false
      replace: |
        enable_log_file_validation    = true
  commands:
    - terraform init
    - checkov -f main.tf
    - terraform plan
backend:
  bucket: config-review
  key: cloudtrail-baseline
  table: none
  locked: false
  lockId: null
awsResources:
  - type: cloudtrail
    name: org-governance
    id: org-governance
    status: failed
    note: Trail is single-region and log file validation is disabled.
stateResources: []
flags:
  initialized: false
  securityPassed: false
  cleanPlan: false
  configValidated: false
