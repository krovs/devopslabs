id: awsConfigRdsPublicBackup
kind: awsconfig
title: IaC Security Baselines RDS Public Backup
description: Review an RDS Terraform resource that is public and has weak recovery settings.
primaryFile: main.tf
tips:
  - Public accessibility is rarely acceptable for an application database.
  - Production RDS should keep backups.
  - Deletion protection prevents accidental destructive changes.
files:
  "main.tf": |
    provider "aws" {
      region = "eu-west-1"
    }

    resource "aws_db_instance" "app" {
      identifier           = "prod-app-db"
      engine               = "postgres"
      instance_class       = "db.t3.medium"
      allocated_storage    = 50
      username             = "app"
      publicly_accessible  = true
      backup_retention_period = 0
      deletion_protection  = false
      skip_final_snapshot  = true
    }
solution:
  summary: |
    Review an RDS Terraform resource that is public and has weak recovery settings.
  steps:
    - Public accessibility is rarely acceptable for an application database.
    - Production RDS should keep backups.
    - Deletion protection prevents accidental destructive changes.
  explanation: |
    Review an RDS Terraform resource that is public and has weak recovery settings.
    
    The Terraform configuration now includes the missing security baseline and the simulated Checkov gate can pass. The solved path covers initialization, security scanning, and planning.
    
    Operationally, this matters because cloud guardrails are reviewed before deployment instead of being discovered after resources are already live.
  outcome: |
    IaC Security Baselines RDS Public Backup: The Terraform configuration now includes the missing security baseline and the simulated Checkov gate can pass.
  focusFileName: main.tf
  replacements:
    - fileName: main.tf
      search: |
        publicly_accessible  = true
      replace: |
        publicly_accessible  = false
    - fileName: main.tf
      search: |
        backup_retention_period = 0
      replace: |
        backup_retention_period = 30
    - fileName: main.tf
      search: |
        deletion_protection  = false
      replace: |
        deletion_protection  = true
    - fileName: main.tf
      search: |
        skip_final_snapshot  = true
      replace: |
        skip_final_snapshot  = false
  commands:
    - terraform init
    - checkov -f main.tf
    - terraform plan
backend:
  bucket: config-review
  key: rds-public-backup
  table: none
  locked: false
  lockId: null
awsResources:
  - type: rds_instance
    name: prod-app-db
    id: prod-app-db
    status: failed
    note: RDS is public, has no backup retention, and lacks deletion protection.
stateResources: []
flags:
  initialized: false
  securityPassed: false
  cleanPlan: false
  configValidated: false
