id: drRdsFailoverVerify
kind: dr
title: RDS Multi-AZ Failover and Verify
description: Promote the RDS standby, verify the application reconnects, and confirm replica health before cutover.
primaryFile: failover.json
tips:
  - Run aws rds describe-db-clusters --db-cluster-identifier checkout-prod to inspect.
  - The cluster is Multi-AZ but the failover action is still monitor.
  - Promote the standby to take over.
  - Verify replica health is healthy before cutover.
  - Confirm the application reconnect was verified.
files:
  "failover.json": |
    {
      "cluster": "checkout-prod",
      "action": "monitor",
      "replicaHealth": "unknown",
      "appReconnectVerified": false
    }
  "rds-events.txt": |
    cluster: checkout-prod
    multiAZ: true
    standby: available but not promoted
    appPool: still pointing at old writer
solution:
  summary: |
    The failover is stuck on monitor. Promote the standby, confirm replica health, and verify the application reconnects before cutover.
  steps:
    - Run aws rds describe-db-clusters --db-cluster-identifier checkout-prod to inspect the cluster.
    - Confirm the cluster is Multi-AZ with an available standby.
    - Change action from monitor to promote.
    - Set replicaHealth to healthy.
    - Set appReconnectVerified to true.
    - Run aws rds describe-db-clusters again to confirm failover is complete.
  explanation: |
    A Multi-AZ failover requires promoting the standby, confirming the new writer is healthy, and verifying the application pool reconnects before declaring cutover complete.
  outcome: |
    The standby is promoted, replica health is healthy, and the application reconnect is verified.
  focusFileName: failover.json
  replacements:
    - fileName: failover.json
      search: '"action": "monitor",'
      replace: '"action": "promote",'
    - fileName: failover.json
      search: '"replicaHealth": "unknown",'
      replace: '"replicaHealth": "healthy",'
    - fileName: failover.json
      search: '"appReconnectVerified": false'
      replace: '"appReconnectVerified": true'
  commands:
    - aws rds describe-db-clusters --db-cluster-identifier checkout-prod
    - check
backend:
  bucket: disaster-recovery
  key: rds-failover-verify
  table: none
  locked: false
  lockId: null
awsResources:
  - type: rds_cluster
    name: checkout-prod
    id: checkout-prod
    status: failed
    note: Failover stuck on monitor; standby not promoted and reconnect unverified.
stateResources:
  - address: rds.cluster.action
    id: monitor
  - address: rds.cluster.replicaHealth
    id: unknown
flags:
  drValidated: false
