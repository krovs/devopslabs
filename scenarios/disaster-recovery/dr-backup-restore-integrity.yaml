id: drBackupRestoreIntegrity
kind: dr
title: Backup Restore Integrity Check
description: Restore the nightly PostgreSQL backup to staging and verify row-count and checksum diffs against the production snapshot.
primaryFile: restore.json
tips:
  - The nightly backup has not been restored.
  - Restore the backup to the staging target.
  - Verify checksum and row-count diffs match the production snapshot.
files:
  "restore.json": |
    {
      "source": "nightly-pg-backup",
      "target": "staging-restore",
      "action": "none",
      "checksumDiff": "mismatch",
      "rowCountDiff": "mismatch"
    }
  "integrity.txt": |
    expected: checksum and row-count diffs match production snapshot.
    current: no restore performed, diffs mismatch.
solution:
  summary: |
    The backup has not been restored and integrity diffs mismatch. Restore the backup and verify checksum and row-count diffs match.
  steps:
    - Restore the nightly PostgreSQL backup to staging-restore.
    - Verify the checksum diff matches the production snapshot.
    - Verify the row-count diff matches the production snapshot.
  explanation: |
    A backup is only useful if it restores and the restored data matches the source. Restoring to staging and comparing checksum and row-count diffs proves the backup is recoverable and intact.
  outcome: |
    The backup is restored and both checksum and row-count diffs match.
  focusFileName: restore.json
  replacements:
    - fileName: restore.json
      search: '"action": "none",'
      replace: '"action": "restore",'
    - fileName: restore.json
      search: '"checksumDiff": "mismatch",'
      replace: '"checksumDiff": "match",'
    - fileName: restore.json
      search: '"rowCountDiff": "mismatch"'
      replace: '"rowCountDiff": "match"'
  commands:
    - dr validate
backend:
  bucket: disaster-recovery
  key: backup-restore-integrity
  table: none
  locked: false
  lockId: null
awsResources:
  - type: backup_restore
    name: nightly-pg-backup
    id: nightly-pg-backup
    status: failed
    note: Backup not restored; checksum and row-count diffs mismatch.
stateResources:
  - address: restore.action
    id: none
  - address: restore.checksumDiff
    id: mismatch
flags:
  drValidated: false
