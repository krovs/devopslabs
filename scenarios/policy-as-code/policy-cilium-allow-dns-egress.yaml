id: policyCiliumAllowDnsEgress
kind: policy
title: Cilium Allow DNS Egress
description: Fix a CiliumNetworkPolicy so worker Pods can resolve DNS without opening broad egress.
primaryFile: policy.yaml
tips:
  - The endpoint selector should target app worker.
  - DNS egress should go to the kube-dns endpoint.
  - Keep the allowed port scoped to UDP 53.
files:
  "policy.yaml": |
    apiVersion: cilium.io/v2
    kind: CiliumNetworkPolicy
    metadata:
      name: allow-dns-egress
      namespace: platform
    spec:
      endpointSelector:
        matchLabels:
          app: worker
      egress:
        - toEntities:
            - world
  "requirements.md": |
    Goal:
    Allow worker Pods to resolve DNS without allowing general internet egress.

    Required:
    - kind is CiliumNetworkPolicy
    - metadata.namespace is platform
    - endpointSelector.matchLabels.app is worker
    - egress uses toEndpoints matching k8s-app: kube-dns
    - toPorts allows UDP port 53
solution:
  summary: |
    Fix a CiliumNetworkPolicy so worker Pods can resolve DNS without opening broad egress.
  steps:
    - The endpoint selector should target app worker.
    - DNS egress should go to the kube-dns endpoint.
    - Keep the allowed port scoped to UDP 53.
  explanation: |
    Fix a CiliumNetworkPolicy so worker Pods can resolve DNS without opening broad egress.
    
    The policy-as-code rule now enforces the expected workload behavior and passes its simulated test. The solved path covers kubectl apply --dry-run=server -f policy.yaml.
    
    Operationally, this matters because platform controls are validated as code before they are trusted in a shared cluster.
  outcome: |
    Cilium Allow DNS Egress: The policy-as-code rule now enforces the expected workload behavior and passes its simulated test.
  focusFileName: policy.yaml
  files:
    "policy.yaml": |
      apiVersion: cilium.io/v2
      kind: CiliumNetworkPolicy
      metadata:
        name: allow-dns-egress
        namespace: platform
      spec:
        endpointSelector:
          matchLabels:
            app: worker
        egress:
          - toEndpoints:
              - matchLabels:
                  k8s-app: kube-dns
            toPorts:
              - ports:
                  - port: "53"
                    protocol: UDP
  commands:
    - kubectl apply --dry-run=server -f policy.yaml
backend:
  bucket: policy-as-code
  key: cilium-allow-dns-egress
  table: none
  locked: false
  lockId: null
awsResources:
  - type: policy_as_code
    name: allow-dns-egress
    id: ciliumnetworkpolicy/platform/allow-dns-egress
    status: failed
    note: Cilium policy opens egress to world instead of only kube-dns UDP/53.
stateResources:
  - address: cluster.kind
    id: dev-platform
  - address: namespace.platform
    id: platform
flags:
  policyValidated: false
