id: policyIstioDenyUnauthenticated
kind: policy
title: Istio Require Authenticated Requests
description: Fix an Istio AuthorizationPolicy so checkout-api only accepts requests with an authenticated JWT principal.
primaryFile: policy.yaml
tips:
  - The policy should target app checkout-api in the checkout namespace.
  - Use an ALLOW policy with requestPrincipals so unauthenticated requests are not allowed.
  - 'requestPrincipals: ["*"] means any authenticated principal.'
files:
  "policy.yaml": |
    apiVersion: security.istio.io/v1beta1
    kind: AuthorizationPolicy
    metadata:
      name: require-jwt-checkout
      namespace: checkout
    spec:
      selector:
        matchLabels:
          app: checkout
      action: ALLOW
      rules:
        - to:
            - operation:
                methods: ["GET", "POST"]
  "requirements.md": |
    Goal:
    Only authenticated callers may reach checkout-api.

    Required:
    - metadata.namespace is checkout
    - selector.matchLabels.app is checkout-api
    - action is ALLOW
    - rules.from.source.requestPrincipals includes "*"
solution:
  summary: |
    Fix an Istio AuthorizationPolicy so checkout-api only accepts requests with an authenticated JWT principal.
  steps:
    - The policy should target app checkout-api in the checkout namespace.
    - Use an ALLOW policy with requestPrincipals so unauthenticated requests are not allowed.
    - 'requestPrincipals: ["*"] means any authenticated principal.'
  explanation: |
    Fix an Istio AuthorizationPolicy so checkout-api only accepts requests with an authenticated JWT principal.
    
    The policy-as-code rule now enforces the expected workload behavior and passes its simulated test. The solved path covers kubectl apply --dry-run=server -f policy.yaml.
    
    Operationally, this matters because platform controls are validated as code before they are trusted in a shared cluster.
    
    Key takeaway: requestPrincipals: ["*"] means any authenticated principal. In a real platform team, this prevents cluster guardrails that look documented but are not enforced or testable as code.
  outcome: |
    Istio Require Authenticated Requests: The policy-as-code rule now enforces the expected workload behavior and passes its simulated test.
  focusFileName: policy.yaml
  files:
    "policy.yaml": |
      apiVersion: security.istio.io/v1beta1
      kind: AuthorizationPolicy
      metadata:
        name: require-jwt-checkout
        namespace: checkout
      spec:
        selector:
          matchLabels:
            app: checkout-api
        action: ALLOW
        rules:
          - from:
              - source:
                  requestPrincipals:
                    - "*"
  commands:
    - kubectl apply --dry-run=server -f policy.yaml
backend:
  bucket: policy-as-code
  key: istio-require-authenticated-requests
  table: none
  locked: false
  lockId: null
awsResources:
  - type: policy_as_code
    name: require-jwt-checkout
    id: authorizationpolicy/checkout/require-jwt-checkout
    status: failed
    note: AuthorizationPolicy targets the wrong workload and does not require an authenticated principal.
stateResources:
  - address: cluster.kind
    id: dev-platform
  - address: namespace.checkout
    id: checkout
flags:
  policyValidated: false
