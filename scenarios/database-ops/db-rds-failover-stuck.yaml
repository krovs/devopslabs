id: dbRdsFailoverStuck
kind: database
title: RDS Failover Stuck
description: A Multi-AZ failover is stuck; diagnose the event log, DNS, and standby health before forcing failover.
primaryFile: failover.json
tips:
  - The failover is stuck waiting.
  - The standby health is unknown.
  - DNS has not been verified against the new writer.
  - Force failover once standby health is confirmed healthy.
files:
  "failover.json": |
    {
      "cluster": "checkout-prod",
      "action": "wait",
      "standbyHealth": "unknown",
      "dnsVerified": false
    }
  "rds-events.txt": |
    cluster: checkout-prod
    event: failover-started then stuck
    standby: available but health not checked
    dns: still pointing at old writer
solution:
  summary: |
    The failover is stuck on wait with unknown standby health and unverified DNS. Confirm standby health, verify DNS, then force failover.
  steps:
    - Check the RDS event log for the stuck failover.
    - Confirm the standby is healthy.
    - Verify DNS points at the new writer.
    - Change action from wait to force-failover.
  explanation: |
    A stuck Multi-AZ failover is usually waiting on an unhealthy standby or stale DNS. Confirming standby health and DNS first avoids promoting a bad replica, then force-failover completes the cutover.
  outcome: |
    Standby health is healthy, DNS is verified, and force-failover completes the cutover.
  focusFileName: failover.json
  replacements:
    - fileName: failover.json
      search: '"action": "wait",'
      replace: '"action": "force-failover",'
    - fileName: failover.json
      search: '"standbyHealth": "unknown",'
      replace: '"standbyHealth": "healthy",'
    - fileName: failover.json
      search: '"dnsVerified": false'
      replace: '"dnsVerified": true'
  commands:
    - db validate
backend:
  bucket: database-ops
  key: rds-failover-stuck
  table: none
  locked: false
  lockId: null
awsResources:
  - type: rds_cluster
    name: checkout-prod
    id: checkout-prod
    status: failed
    note: Failover stuck on wait; standby health unknown and DNS unverified.
stateResources:
  - address: rds.cluster.action
    id: wait
  - address: rds.cluster.standbyHealth
    id: unknown
flags:
  databaseValidated: false
