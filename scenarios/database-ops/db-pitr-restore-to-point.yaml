id: dbPitrRestoreToPoint
kind: database
title: PITR Restore to Specific Timestamp
description: Restore RDS to 30 minutes before a bad migration; verify the target time is inside the retention window.
primaryFile: restore.json
tips:
  - Run aws rds describe-db-logs --db-cluster-identifier checkout-prod to check the PITR window.
  - A bad migration needs a point-in-time restore.
  - The target time is 30 minutes before the migration.
  - The target time is 2026-06-18T11:30:00Z.
  - Verify the target time is inside the retention window before restoring.
files:
  "restore.json": |
    {
      "cluster": "checkout-prod",
      "targetTime": "",
      "withinRetentionWindow": false,
      "action": "none"
    }
  "pitr-window.txt": |
    cluster: checkout-prod
    badMigrationTime: 2026-06-18T12:00:00Z
    targetTime: 2026-06-18T11:30:00Z
    retentionWindow: 35 days
    withinWindow: yes
solution:
  summary: |
    A bad migration requires a point-in-time restore to 30 minutes before it. Set the target time, confirm it is inside the retention window, and restore.
  steps:
    - Run aws rds describe-db-logs --db-cluster-identifier checkout-prod to check the PITR window.
    - Set targetTime to 2026-06-18T11:30:00Z, 30 minutes before the bad migration.
    - Confirm the target time is within the retention window.
    - Change action to pitr-restore.
    - Run aws rds describe-db-logs again to confirm restore queued.
  explanation: |
    Point-in-time recovery restores to a specific moment before a bad change. The target time must be inside the backup retention window or the restore fails, so verifying the window first avoids a failed cutover.
  outcome: |
    The target time is set, inside the retention window, and the PITR restore is queued.
  focusFileName: restore.json
  replacements:
    - fileName: restore.json
      search: '"targetTime": "",'
      replace: '"targetTime": "2026-06-18T11:30:00Z",'
    - fileName: restore.json
      search: '"withinRetentionWindow": false,'
      replace: '"withinRetentionWindow": true,'
    - fileName: restore.json
      search: '"action": "none"'
      replace: '"action": "pitr-restore"'
  commands:
    - aws rds describe-db-logs --db-cluster-identifier checkout-prod
    - check
backend:
  bucket: database-ops
  key: pitr-restore-to-point
  table: none
  locked: false
  lockId: null
awsResources:
  - type: rds_cluster
    name: checkout-prod
    id: checkout-prod
    status: failed
    note: PITR restore not queued; target time empty and retention window unverified.
stateResources:
  - address: restore.targetTime
    id: empty
  - address: restore.action
    id: none
flags:
  databaseValidated: false
