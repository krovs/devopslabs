id: dbSlowQueryPlanRegression
kind: database
title: Slow Query Plan Regression
description: A query plan flipped to a sequential scan after a statistics refresh; analyze the explain and add the missing index.
primaryFile: query.json
tips:
  - The orders query regressed to a sequential scan.
  - The regression started after a statistics refresh dropped the plan.
  - Add the missing index on the user_id column.
  - Confirm the plan switches back to an index scan.
files:
  "query.json": |
    {
      "query": "SELECT * FROM orders WHERE user_id = $1",
      "addIndex": false,
      "indexName": "",
      "plan": "seqScan"
    }
  "explain.txt": |
    query: SELECT * FROM orders WHERE user_id = $1
    planBefore: indexScan on orders_user_idx
    planAfter: seqScan (regression after stats refresh)
    missingIndex: orders_user_idx
solution:
  summary: |
    The query plan regressed to a sequential scan because the supporting index is missing. Add the index and confirm the plan returns to an index scan.
  steps:
    - Analyze the explain output showing the sequential scan.
    - Add the missing index orders_user_idx on user_id.
    - Confirm the plan switches back to indexScan.
  explanation: |
    Query plans regress when statistics refreshes make the planner choose a sequential scan over a missing index. Adding the index and forcing a re-plan restores the index scan and the expected latency.
  outcome: |
    The orders_user_idx index is added and the plan returns to an index scan.
  focusFileName: query.json
  replacements:
    - fileName: query.json
      search: '"addIndex": false,'
      replace: '"addIndex": true,'
    - fileName: query.json
      search: '"indexName": "",'
      replace: '"indexName": "orders_user_idx",'
    - fileName: query.json
      search: '"plan": "seqScan"'
      replace: '"plan": "indexScan"'
  commands:
    - db validate
backend:
  bucket: database-ops
  key: slow-query-plan-regression
  table: none
  locked: false
  lockId: null
awsResources:
  - type: rds_query
    name: orders-by-user
    id: orders-by-user
    status: failed
    note: Query plan regressed to seqScan; missing index orders_user_idx.
stateResources:
  - address: query.addIndex
    id: "false"
  - address: query.plan
    id: seqScan
flags:
  databaseValidated: false
