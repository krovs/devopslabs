id: dbDynamoThrottledOnHotKey
kind: database
title: DynamoDB Hot Key Throttling
description: A single partition key absorbs almost all traffic; diagnose the WCU skew and fix the key distribution.
primaryFile: throughput.json
tips:
  - Run aws dynamodb describe-table --table-name checkout-events to inspect table state.
  - One partition key absorbs 87% of traffic.
  - The partition strategy is single, so all writes hit one partition.
  - Enable hot key sharding to spread writes across partitions.
  - Switch the partition strategy to distributed.
files:
  "throughput.json": |
    {
      "table": "checkout-events",
      "wcuSkew": "87-percent-on-one-partition",
      "hotKeySharding": false,
      "partitionStrategy": "single"
    }
  "cloudwatch.txt": |
    table: checkout-events
    wcuSkew: 87-percent-on-one-partition
    hotKey: user-42
    throttled: WriteThrottleEvents > 0
    recommendation: shard the hot key
solution:
  summary: |
    A single hot partition key absorbs almost all writes and throttles. Enable hot key sharding and switch the partition strategy to distributed.
  steps:
    - Run aws dynamodb describe-table --table-name checkout-events to inspect table.
    - Confirm 87% of WCUs land on one partition.
    - Enable hot key sharding to spread writes across partitions.
    - Switch partitionStrategy from single to distributed.
    - Run aws dynamodb describe-table again to confirm throttling resolved.
  explanation: |
    DynamoDB distributes throughput across partitions by key. A single hot key concentrates writes on one partition and throttles, even when the table has spare capacity. Sharding the hot key spreads writes and removes the throttle.
  outcome: |
    Hot key sharding is enabled and the partition strategy is distributed, so writes spread evenly.
  focusFileName: throughput.json
  replacements:
    - fileName: throughput.json
      search: '"hotKeySharding": false,'
      replace: '"hotKeySharding": true,'
    - fileName: throughput.json
      search: '"partitionStrategy": "single"'
      replace: '"partitionStrategy": "distributed"'
  commands:
    - aws dynamodb describe-table --table-name checkout-events
    - check
backend:
  bucket: database-ops
  key: dynamo-throttled-on-hot-key
  table: none
  locked: false
  lockId: null
awsResources:
  - type: dynamodb_table
    name: checkout-events
    id: checkout-events
    status: failed
    note: One partition absorbs 87% of WCUs; hot key sharding disabled and single partition strategy.
stateResources:
  - address: dynamo.hotKeySharding
    id: "false"
  - address: dynamo.partitionStrategy
    id: single
flags:
  databaseValidated: false
