id: githubActionsCheckovGate
kind: cicd
title: GitHub Actions Checkov Gate
description: A pull request workflow fails because the Checkov IaC security scan detects a public S3 bucket.
primaryFile: .github/workflows/iac-security.yml
tips:
  - Start with gh run view to inspect the failed step.
  - The workflow itself is fine; the security finding is in the Terraform snippet.
  - The scan fails because acl is public-read.
  - Change the workflow's inline Terraform example to use acl = "private".
  - Re-run the workflow.
files:
  ".github/workflows/iac-security.yml": |
    name: iac-security

    on:
      pull_request:
        branches: [main]

    jobs:
      checkov:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: |
              cat > main.tf <<'EOF'
              resource "aws_s3_bucket" "artifacts" {
                bucket = "training-artifacts"
                acl    = "public-read"
              }
              EOF
          - run: checkov -f main.tf
backend:
  bucket: github-actions
  key: iac-security.yml
  table: workflow-runs
  locked: false
  lockId: null
awsResources:
  - type: workflow
    name: iac-security
    id: run-3021
    status: failed
    note: Checkov failed on public S3 ACL.
stateResources:
  - address: path.main.tf
    id: generated by workflow
flags:
  securityPassed: false
  runPassing: false
