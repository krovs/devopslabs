id: scpBlankRequireImdsv2
kind: scp
title: SCP Blank Require IMDSv2
description: Build an SCP from scratch that prevents launching EC2 instances without IMDSv2 required.
primaryFile: scp.json
tips:
  - The relevant condition key is ec2:MetadataHttpTokens.
  - Deny RunInstances when metadata tokens are optional.
  - Keep the policy scoped to EC2 launch behavior.
