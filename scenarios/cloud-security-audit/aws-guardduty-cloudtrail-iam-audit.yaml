id: awsGuardDutyCloudTrailIamAudit
kind: cloudsec
title: AWS GuardDuty CloudTrail IAM Audit
description: Investigate a GuardDuty finding where DeveloperSupportRole was broadened from support-log access and then used to read customer data outside its approved scope.
primaryFile: iam/policy.json
tips:
  - Start with aws guardduty list-findings.
  - Pull the finding details before changing IAM.
  - Use CloudTrail and CloudWatch Logs to identify the role and actions used.
  - Use AWS Config resource history to compare the previous approved policy with the current broad policy.
  - Simulate the role before and after the policy fix.
  - The support role should read only the prod-audit-logs bucket prefix for support cases.
files:
  "iam/policy.json": |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Sid": "SupportTroubleshootingRead",
          "Effect": "Allow",
          "Action": [
            "s3:*",
            "iam:PassRole"
          ],
          "Resource": "*"
        }
      ]
    }
  "guardduty/finding.json": |
    {
      "Id": "gd-9f3b2c1a",
      "Type": "UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration.OutsideAWS",
      "Severity": 8.1,
      "Resource": "arn:aws:iam::123456789012:role/DeveloperSupportRole",
      "Service": {
        "Action": {
          "AwsApiCallAction": {
            "Api": "GetObject",
            "ServiceName": "s3.amazonaws.com",
            "RemoteIpDetails": {
              "IpAddressV4": "198.51.100.77",
              "Country": "Exampleland"
            }
          }
        }
      }
    }
  "cloudtrail/events.json": |
    [
      {
        "eventTime": "2026-06-03T07:42:11Z",
        "eventSource": "sts.amazonaws.com",
        "eventName": "AssumeRole",
        "userIdentity": "arn:aws:iam::123456789012:user/alex",
        "requestParameters": {
          "roleArn": "arn:aws:iam::123456789012:role/DeveloperSupportRole"
        }
      },
      {
        "eventTime": "2026-06-03T07:43:02Z",
        "eventSource": "s3.amazonaws.com",
        "eventName": "GetObject",
        "userIdentity": "arn:aws:iam::123456789012:role/DeveloperSupportRole",
        "requestParameters": {
          "bucketName": "prod-customer-data",
          "key": "exports/full-customer-list.csv"
        }
      }
    ]
  "config/timeline.json": |
    [
      {
        "configurationItemCaptureTime": "2026-06-02T18:21:54Z",
        "resourceType": "AWS::IAM::Policy",
        "resourceName": "DeveloperSupportPolicy",
        "changedBy": "arn:aws:iam::123456789012:user/alex",
        "changeSummary": "Policy broadened from support-case log access to s3:* and iam:PassRole on *",
        "previousPolicy": {
          "statements": [
            {
              "effect": "Allow",
              "action": "s3:ListBucket",
              "resource": "arn:aws:s3:::prod-audit-logs",
              "condition": {
                "StringLike": {
                  "s3:prefix": "support-cases/*"
                }
              }
            },
            {
              "effect": "Allow",
              "action": "s3:GetObject",
              "resource": "arn:aws:s3:::prod-audit-logs/support-cases/*"
            }
          ]
        },
        "currentPolicy": {
          "actions": ["s3:*", "iam:PassRole"],
          "resources": ["*"]
        }
      }
    ]
  "runbook.md": |
    Goal:
    - Investigate the GuardDuty finding and mitigate the risky permission path.

    Constraints:
    - Do not disable GuardDuty, CloudTrail, AWS Config, or logging.
    - Confirm the affected role, source IP, action, and accessed object before changing policy.
    - Restore the previous approved support-case log access only.
    - Remove iam:PassRole and broad S3 access from DeveloperSupportRole.
    - Prove the revised policy no longer allows broad S3 or pass-role access.
    - Treat this as containment only: a full remediation would also review and restrict Alex's ability to modify production IAM policies.
solution:
  summary: |
    GuardDuty reported suspicious S3 access using DeveloperSupportRole. CloudTrail and CloudWatch Logs show the role read prod-customer-data, which is outside the approved support scope. AWS Config shows Alex broadened DeveloperSupportPolicy from support-case log access to s3:* plus iam:PassRole on all resources.
  steps:
    - Run aws guardduty list-findings to find the active finding.
    - Run aws guardduty get-findings to inspect the role, API, severity, and remote IP.
    - Run aws cloudtrail lookup-events to identify the AssumeRole and GetObject events.
    - Run aws logs filter-log-events to correlate the CloudTrail event context.
    - Run aws configservice get-resource-config-history to compare the previous approved support policy with the current broad policy.
    - Run aws iam simulate-principal-policy to prove the current permissions are too broad.
    - Replace s3:* and iam:PassRole on * with the previous approved support-case log access.
    - Run aws iam simulate-principal-policy again and check the scenario.
  explanation: |
    A cloud security audit should connect detection, activity history, configuration drift, and effective permissions. GuardDuty gives the lead, CloudTrail and CloudWatch Logs show DeveloperSupportRole read customer data from prod-customer-data, AWS Config shows that the role used to be limited to prod-audit-logs/support-cases, and IAM simulation proves whether the risky permission path still exists.
  outcome: |
    DeveloperSupportRole can read only support-case audit objects, iam:PassRole is removed, broad S3 access is denied, and the investigation trail identifies the risky policy change.
  focusFileName: iam/policy.json
  files:
    "iam/policy.json": |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "ListSupportCases",
            "Effect": "Allow",
            "Action": "s3:ListBucket",
            "Resource": "arn:aws:s3:::prod-audit-logs",
            "Condition": {
              "StringLike": {
                "s3:prefix": "support-cases/*"
              }
            }
          },
          {
            "Sid": "ReadSupportCaseObjects",
            "Effect": "Allow",
            "Action": "s3:GetObject",
            "Resource": "arn:aws:s3:::prod-audit-logs/support-cases/*"
          }
        ]
      }
  commands:
    - aws guardduty list-findings
    - aws guardduty get-findings
    - aws cloudtrail lookup-events
    - aws logs filter-log-events
    - aws configservice get-resource-config-history
    - aws iam simulate-principal-policy
    - check
backend:
  bucket: cloud-security-audit
  key: guardduty-cloudtrail-iam-audit
  table: investigations
  locked: false
  lockId: null
awsResources:
  - type: guardduty_finding
    name: gd-9f3b2c1a
    id: UnauthorizedAccess:IAMUser/InstanceCredentialExfiltration.OutsideAWS
    status: failed
    note: DeveloperSupportRole has broad S3 and iam:PassRole permissions after a recent policy change.
stateResources:
  - address: guardduty.finding.gd-9f3b2c1a
    id: active
  - address: iam.role.DeveloperSupportRole.s3
    id: "s3:*"
  - address: iam.role.DeveloperSupportRole.passrole
    id: allowed
flags:
  initialized: false
  validationPassed: false
  securityPassed: false
  cleanPlan: false
  cloudsecValidated: false
