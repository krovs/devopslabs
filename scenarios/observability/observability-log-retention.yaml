id: observabilityLogRetention
kind: observability
title: CloudWatch Log Retention
description: An ECS service log group keeps logs forever and is driving avoidable storage growth.
primaryFile: log-group.json
tips:
  - Inspect the log group before editing.
  - Production app logs should have an explicit retention period.
  - Set payments-api retention to 30 days.
files:
  "log-group.json": |
    {
      "logGroupName": "/aws/ecs/payments-api",
      "retentionInDays": null,
      "kmsKeyId": "alias/logs-kms"
    }
  "policy.md": |
    Required:
    - /aws/ecs/payments-api must retain logs for 30 days
    - Keep the existing KMS key
solution:
  summary: |
    An ECS service log group keeps logs forever and is driving avoidable storage growth.
  steps:
    - Inspect the log group before editing.
    - Production app logs should have an explicit retention period.
    - Set payments-api retention to 30 days.
  explanation: |
    An ECS service log group keeps logs forever and is driving avoidable storage growth.
    
    The log retention, alarm dimension, or notification action now models the signal operators need. The solved path covers aws logs describe-log-groups.
    
    Operationally, this matters because monitoring produces useful incidents instead of silent failures, noisy alarms, or unbounded log retention.
  outcome: |
    CloudWatch Log Retention: The log retention, alarm dimension, or notification action now models the signal operators need.
  focusFileName: log-group.json
  files:
    "log-group.json": |
      { "logGroupName": "/aws/ecs/payments-api", "retentionInDays": 30, "kmsKeyId": "alias/logs-kms" }
  commands:
    - aws logs describe-log-groups
backend:
  bucket: observability-training
  key: cloudwatch-log-retention
  table: none
  locked: false
  lockId: null
awsResources:
  - type: log_group
    name: /aws/ecs/payments-api
    id: /aws/ecs/payments-api
    status: failed
    note: Log group has no retention policy.
stateResources:
  - address: service
    id: payments-api
  - address: kms.key
    id: alias/logs-kms
flags:
  observabilityValidated: false
