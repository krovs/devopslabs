id: scpDenyLeavingOrg
kind: scp
title: SCP Deny Leaving Organization
description: Member accounts can leave the AWS Organization because the baseline SCP does not deny LeaveOrganization.
primaryFile: scp.json
tips:
  - SCPs set guardrails; they do not grant permissions.
  - Use an explicit Deny for organizations:LeaveOrganization.
  - Keep the deny scoped to the specific action instead of denying all Organizations APIs.
files:
  "scp.json": |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Sid": "BaselineOrganizations",
          "Effect": "Allow",
          "Action": "organizations:DescribeOrganization",
          "Resource": "*"
        }
      ]
    }
  "request.txt": |
    Required:
    - Deny organizations:LeaveOrganization for all member accounts
    - Do not deny read-only Organizations actions
    - Avoid Action "*"; SCPs commonly use Resource "*" for account-level guardrails
solution:
  summary: |
    Member accounts can leave the AWS Organization because the baseline SCP does not deny LeaveOrganization.
  steps:
    - SCPs set guardrails; they do not grant permissions.
    - Use an explicit Deny for organizations:LeaveOrganization.
    - Keep the deny scoped to the specific action instead of denying all Organizations APIs.
  explanation: |
    Member accounts can leave the AWS Organization because the baseline SCP does not deny LeaveOrganization.
    
    The organization policy now enforces the guardrail while preserving the intended exception or allowed path. The solved path covers scps set guardrails; they do not grant permissions, use an explicit deny for organizations:leaveorganization, and keep the deny scoped to the specific action instead of denying all organizations apis.
    
    Operationally, this matters because account-level behavior is controlled centrally without blocking the wrong principals or regions.
    
    The organization policy now enforces the guardrail while preserving the intended exception or allowed path. The solved path covers aws iam simulate-principal-policy.
    
    Operationally, this matters because account-level behavior is controlled centrally without blocking the wrong principals or regions.
    
    Key takeaway: Keep the deny scoped to the specific action instead of denying all Organizations APIs. In a real platform team, this prevents organization guardrails that either over-block valid operations or leave risky exceptions unmanaged.
  outcome: |
    SCP Deny Leaving Organization: The organization policy now enforces the guardrail while preserving the intended exception or allowed path.
  focusFileName: scp.json
  files:
    "scp.json": |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Effect": "Deny",
            "Action": "organizations:LeaveOrganization",
            "Resource": "*"
          }
        ]
      }
  commands:
    - aws iam simulate-principal-policy
