id: scpBlankDenyRootUser
kind: scp
title: SCP Blank Deny Root User
description: Build an SCP from a blank policy that denies root-user actions while preserving a billing exception.
primaryFile: scp.json
tips:
  - Start from the requirement notes, not from an existing policy.
  - SCP Deny statements can match root users with aws:PrincipalArn.
  - In a Deny statement, NotAction means deny every action except the listed action.
  - Use NotAction for the billing exception; an Allow statement cannot override an explicit Deny.
files:
  "scp.json": |
    {}
  "request.txt": |
    Build an SCP that:
    - Denies actions when aws:PrincipalArn matches arn:aws:iam::*:root
    - Allows the root user only to view billing in the portal
    - Uses an explicit Deny statement
    - Uses NotAction so the Deny applies to every action except aws-portal:ViewBilling
    - Does not rely on an Allow statement to override a Deny
solution:
  summary: |
    Build an SCP from a blank policy that denies root-user actions while preserving a billing exception.
  steps:
    - Start from the requirement notes, not from an existing policy.
    - SCP Deny statements can match root users with aws:PrincipalArn.
    - In a Deny statement, use NotAction so the Deny applies to everything except aws-portal:ViewBilling.
  explanation: |
    Build an SCP from a blank policy that denies root-user actions while preserving a billing exception.
    
    The organization policy now enforces the guardrail while preserving the intended exception or allowed path. The solved path covers scenario validation.
    
    Operationally, this matters because account-level behavior is controlled centrally without blocking the wrong principals or regions.
  outcome: |
    SCP Blank Deny Root User: The organization policy now enforces the guardrail while preserving the intended exception or allowed path.
  focusFileName: scp.json
  files:
    "scp.json": |
      {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "DenyRootExceptBillingView",
            "Effect": "Deny",
            "NotAction": "aws-portal:ViewBilling",
            "Resource": "*",
            "Condition": {
              "StringLike": {
                "aws:PrincipalArn": "arn:aws:iam::*:root"
              }
            }
          }
        ]
      }
  commands:
    - aws iam simulate-principal-policy
backend:
