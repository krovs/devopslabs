id: scpBlankRequireImdsv2
kind: scp
title: SCP Blank Require IMDSv2
description: Build an SCP from scratch that prevents launching EC2 instances without IMDSv2 required.
primaryFile: scp.json
tips:
  - The relevant condition key is ec2:MetadataHttpTokens.
  - Deny RunInstances when metadata tokens are optional.
  - Keep the policy scoped to EC2 launch behavior.
files:
  "scp.json": |
    {}
  "request.txt": |
    Build an SCP that:
    - Denies ec2:RunInstances
    - Uses ec2:MetadataHttpTokens
    - Denies when the value is optional
    - Does not deny all ec2:* actions
solution:
  summary: |
    Build an SCP from scratch that prevents launching EC2 instances without IMDSv2 required.
  steps:
    - The relevant condition key is ec2:MetadataHttpTokens.
    - Deny RunInstances when metadata tokens are optional.
    - Keep the policy scoped to EC2 launch behavior.
  explanation: |
    Build an SCP from scratch that prevents launching EC2 instances without IMDSv2 required.
    
    The organization policy now enforces the guardrail while preserving the intended exception or allowed path. The solved path covers scenario validation.
    
    Operationally, this matters because account-level behavior is controlled centrally without blocking the wrong principals or regions.
  outcome: |
    SCP Blank Require IMDSv2: The organization policy now enforces the guardrail while preserving the intended exception or allowed path.
  focusFileName: scp.json
  files:
    "scp.json": |
      { "Version": "2012-10-17", "Statement": [{ "Effect": "Deny", "Action": "ec2:RunInstances", "Resource": "arn:aws:ec2:*:*:instance/*", "Condition": { "StringEquals": { "ec2:MetadataHttpTokens": "optional" } } }] }
  commands:
    - check
