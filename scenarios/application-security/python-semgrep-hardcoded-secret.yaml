id: pythonSemgrepHardcodedSecret
kind: appsec
title: Semgrep Python Hardcoded Secret
description: A Python config file commits an AWS secret access key. Semgrep blocks the change until the secret is moved to an environment variable.
primaryFile: config.py
tips:
  - Start with semgrep scan to see the finding.
  - The config file hardcodes both the AWS access key and secret key.
  - Move both credentials to os.environ.get() calls.
  - Never commit real AWS credentials in source files.
files:
  "config.py": |
    import boto3

    AWS_ACCESS_KEY_ID = "AKIAIOSFODNN7EXAMPLE"
    AWS_SECRET_ACCESS_KEY = "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
    AWS_REGION = "eu-west-1"

    session = boto3.Session(
        aws_access_key_id=AWS_ACCESS_KEY_ID,
        aws_secret_access_key=AWS_SECRET_ACCESS_KEY,
        region_name=AWS_REGION,
    )
  ".semgrep.yml": |
    rules:
      - id: python.lang.security.audit.aws-hardcoded-secret
        message: Avoid hardcoding AWS credentials in source files.
        severity: HIGH
        languages: [python]
        patterns:
          - pattern: AWS_SECRET_ACCESS_KEY = "..."
solution:
  summary: |
    The config file hardcodes AWS credentials. Semgrep blocks the change because hardcoded secrets can leak through source control.
  steps:
    - Run semgrep scan to see the hardcoded secret finding.
    - Replace the hardcoded AWS access key and secret key with os.environ.get() calls.
    - Keep the AWS_REGION and boto3 Session structure.
    - Run semgrep scan again to confirm no findings.
  explanation: |
    Hardcoded secrets in source files leak through version control and CI logs. Moving credentials to environment variables keeps them out of the repository while the application still authenticates to AWS at runtime.
  outcome: |
    Semgrep reports no blocking findings and the config reads AWS credentials from environment variables.
  focusFileName: config.py
  files:
    "config.py": |
      import os
      import boto3

      AWS_ACCESS_KEY_ID = os.environ.get("AWS_ACCESS_KEY_ID")
      AWS_SECRET_ACCESS_KEY = os.environ.get("AWS_SECRET_ACCESS_KEY")
      AWS_REGION = os.environ.get("AWS_REGION", "eu-west-1")

      session = boto3.Session(
          aws_access_key_id=AWS_ACCESS_KEY_ID,
          aws_secret_access_key=AWS_SECRET_ACCESS_KEY,
          region_name=AWS_REGION,
      )
  commands:
    - semgrep scan
    - check
backend:
  bucket: appsec-training
  key: semgrep-python-hardcoded-secret
  table: none
  locked: false
  lockId: null
awsResources:
  - type: finding
    name: semgrep-aws-secret
    id: config.py:3
    status: failed
    note: Semgrep found a hardcoded AWS secret access key in config.py.
stateResources:
  - address: semgrep.finding.aws-secret
    id: open
flags:
  securityPassed: false
  appsecValidated: false
