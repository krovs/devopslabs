id: javaDependencySecretsContainerAudit
kind: appsec
title: Java Dependency Secrets And Container Audit
description: A Spring Boot service fails DevSecOps gates because it uses a vulnerable logging dependency, commits a JWT secret, and runs the container as root.
primaryFile: pom.xml
tips:
  - Start with mvn test to make sure the app still builds.
  - Run dependency-check to inspect vulnerable Maven packages.
  - Run gitleaks to find committed secrets in configuration.
  - Run trivy config to inspect the Dockerfile.
  - Upgrade logback-classic to 1.4.14.
  - Replace the committed JWT secret with an environment placeholder.
  - Add a non-root user before the Docker entrypoint.
files:
  "pom.xml": |
    <project xmlns="http://maven.apache.org/POM/4.0.0">
      <modelVersion>4.0.0</modelVersion>
      <groupId>com.acme</groupId>
      <artifactId>checkout-api</artifactId>
      <version>1.0.0</version>

      <properties>
        <java.version>17</java.version>
        <spring-boot.version>3.2.6</spring-boot.version>
      </properties>

      <dependencyManagement>
        <dependencies>
          <dependency>
            <groupId>org.springframework.boot</groupId>
            <artifactId>spring-boot-dependencies</artifactId>
            <version>${spring-boot.version}</version>
            <type>pom</type>
            <scope>import</scope>
          </dependency>
        </dependencies>
      </dependencyManagement>

      <dependencies>
        <dependency>
          <groupId>org.springframework.boot</groupId>
          <artifactId>spring-boot-starter-web</artifactId>
        </dependency>
        <dependency>
          <groupId>ch.qos.logback</groupId>
          <artifactId>logback-classic</artifactId>
          <version>1.2.10</version>
        </dependency>
      </dependencies>
    </project>
  "src/main/resources/application.yml": |
    security:
      jwt:
        issuer: checkout-api
        secret: dev-secret-please-change
    management:
      endpoints:
        web:
          exposure:
            include: health,info
  "Dockerfile": |
    FROM eclipse-temurin:17-jre
    WORKDIR /app
    COPY target/checkout-api.jar /app/checkout-api.jar
    ENTRYPOINT ["java", "-jar", "/app/checkout-api.jar"]
  "runbook.md": |
    Goal:
    - Clear the Java service security audit before release.

    Constraints:
    - Keep Spring Boot on 3.2.6.
    - Do not suppress dependency-check findings.
    - Do not leave JWT material in source-controlled config.
    - Do not run the container as root.
    - Re-run the build after the security fixes.
solution:
  summary: |
    The service has three gate failures: logback-classic is pinned to a vulnerable version, application.yml contains a committed JWT secret, and the Dockerfile does not switch away from the root user.
  steps:
    - Run mvn test to confirm the baseline build.
    - Run mvn org.owasp:dependency-check-maven:check to identify the vulnerable logback package.
    - Run gitleaks detect to find the committed JWT secret.
    - Run trivy config . to detect that the container runs as root.
    - Upgrade logback-classic from 1.2.10 to 1.4.14.
    - Replace the JWT secret value with ${JWT_SECRET}.
    - Add a non-root app user and USER appuser before the entrypoint.
    - Re-run the scan commands and mvn test.
  explanation: |
    A DevSecOps audit should distinguish dependency risk, secret exposure, and container hardening. Suppressing scanner output or relying on runtime conventions would leave release risk in place. The smallest safe fix updates the vulnerable package, externalizes secret material, and makes the image run without root privileges.
  outcome: |
    Dependency-check, gitleaks, trivy config, and the Maven test gate pass with no committed secret or root container runtime.
  focusFileName: pom.xml
  replacements:
    - fileName: pom.xml
      search: |
          <version>1.2.10</version>
      replace: |
          <version>1.4.14</version>
    - fileName: src/main/resources/application.yml
      search: |
        secret: dev-secret-please-change
      replace: |
        secret: ${JWT_SECRET}
    - fileName: Dockerfile
      search: |
        ENTRYPOINT ["java", "-jar", "/app/checkout-api.jar"]
      replace: |
        RUN addgroup --system app && adduser --system --ingroup app appuser
        USER appuser
        ENTRYPOINT ["java", "-jar", "/app/checkout-api.jar"]
  commands:
    - mvn test
    - mvn org.owasp:dependency-check-maven:check
    - gitleaks detect
    - trivy config .
    - check
backend:
  bucket: appsec
  key: checkout-api-java-hygiene
  table: application-security
  locked: false
  lockId: null
awsResources:
  - type: java_service
    name: checkout-api
    id: checkout-api
    status: failed
    note: Dependency, secret, and container security gates are failing.
stateResources:
  - address: maven.logback-classic
    id: 1.2.10
  - address: secret.jwt
    id: committed
  - address: container.user
    id: root
flags:
  initialized: false
  securityPassed: false
  secretsConfigured: false
  lintPassed: false
  runPassing: false
  appsecValidated: false
