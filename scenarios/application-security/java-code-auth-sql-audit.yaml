  - type: java_service
    name: checkout-api
    id: checkout-api
    status: failed
    note: Code audit found client-controlled authorization and SQL injection risk.
stateResources:
  - address: controller.admin.authorization
    id: request-header
  - address: repository.user.findByEmail
    id: string-concat-sql
flags:
  initialized: false
  securityPassed: false
  runPassing: false
  appsecValidated: false
