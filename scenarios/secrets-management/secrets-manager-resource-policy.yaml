id: secretsManagerResourcePolicy
kind: secrets
title: Secrets Manager Resource Policy
description: A production API key secret has a resource policy that allows cross-account wildcard access.
primaryFile: resource-policy.json
tips:
  - Describe the secret before editing.
  - The policy should only allow the audit role from the security account.
  - Keep BlockPublicPolicy enabled and avoid Principal "*".
files:
  "resource-policy.json": |
    {
      "secretName": "prod/payments/api-key",
      "blockPublicPolicy": false,
      "policy": {
        "Version": "2012-10-17",
        "Statement": [
          {
            "Sid": "AllowAuditRead",
            "Effect": "Allow",
            "Principal": "*",
            "Action": "secretsmanager:GetSecretValue",
            "Resource": "*"
          }
        ]
      }
    }
  "policy-notes.md": |
    Required:
    - Enable blockPublicPolicy
    - Principal must be arn:aws:iam::210987654321:role/security-audit
    - Action must stay limited to secretsmanager:GetSecretValue
solution:
  summary: |
    A production API key secret has a resource policy that allows cross-account wildcard access.
  steps:
    - Describe the secret before editing.
    - The policy should only allow the audit role from the security account.
    - Keep BlockPublicPolicy enabled and avoid Principal "*".
  explanation: |
    A production API key secret has a resource policy that allows cross-account wildcard access.
    
    The secret path, resource policy, KMS setting, or rotation configuration now matches the intended access pattern. The solved path covers aws secretsmanager describe-secret.
    
    Operationally, this matters because applications consume secrets from the right boundary without exposing broader secret material.
  outcome: |
    Secrets Manager Resource Policy: The secret path, resource policy, KMS setting, or rotation configuration now matches the intended access pattern.
  focusFileName: resource-policy.json
  files:
    "resource-policy.json": |
      { "secretName": "prod/payments/api-key", "blockPublicPolicy": true, "policy": { "Statement": [{ "Principal": "arn:aws:iam::210987654321:role/security-audit", "Action": "secretsmanager:GetSecretValue", "Resource": "arn:aws:secretsmanager:eu-west-1:123456789012:secret:prod/payments/api-key" }] } }
  commands:
    - aws secretsmanager describe-secret
backend:
  bucket: secrets-training
  key: secrets-manager-resource-policy
  table: none
  locked: false
  lockId: null
awsResources:
  - type: secret
    name: prod/payments/api-key
    id: arn:aws:secretsmanager:eu-west-1:123456789012:secret:prod/payments/api-key
    status: failed
    note: Secret resource policy allows wildcard principal access and does not block public policies.
stateResources:
  - address: audit.role
    id: arn:aws:iam::210987654321:role/security-audit
flags:
  secretsValidated: false
