id: secretsVaultKvPolicyPath
kind: secrets
title: Vault KV Policy Path
description: checkout-api runs in staging, but its Vault policy allows reading the production KV path.
primaryFile: vault-policy.hcl
tips:
  - Check the Vault policy path before editing.
  - The app runs in staging and uses KV v2.
  - KV v2 policies use secret/data/... for read access.
  - Keep read access scoped to the staging checkout database path.
files:
  "vault-policy.hcl": |
    path "secret/data/prod/checkout/db" {
      capabilities = ["read"]
    }
  "app-config.yaml": |
    service: checkout-api
    environment: staging
    vaultSecretPath: secret/staging/checkout/db
  "vault-secrets.txt": |
    secret/staging/checkout/db
    secret/prod/checkout/db
solution:
  summary: |
    checkout-api runs in staging, but its Vault policy allows reading the production KV path.
  steps:
    - Run vault policy read checkout-api to inspect the policy.
    - Run vault token capabilities secret/data/staging/checkout/db to verify staging access.
    - Change the policy path from secret/data/prod/checkout/db to secret/data/staging/checkout/db.
    - Run vault token capabilities secret/data/staging/checkout/db again.
  explanation: |
    Vault KV v2 stores secrets at user-facing paths such as secret/staging/checkout/db, but ACL policies use the API path secret/data/staging/checkout/db for reads. Environment path scoping keeps staging workloads from reading production credentials.
  outcome: |
    checkout-api can read only the staging Vault KV path needed for its database credential.
  focusFileName: vault-policy.hcl
  replacements:
    - fileName: vault-policy.hcl
      search: |
        secret/data/prod/checkout/db
      replace: |
        secret/data/staging/checkout/db
  commands:
    - vault policy read checkout-api
    - vault token capabilities secret/data/staging/checkout/db
backend:
  bucket: secrets-training
  key: vault-kv-policy-path
  table: none
  locked: false
  lockId: null
awsResources:
  - type: vault_policy
    name: checkout-api
    id: vault/policy/checkout-api
    status: failed
    note: Vault policy allows production KV read from a staging workload.
stateResources:
  - address: vault.policy.checkout-api.path
    id: secret/data/prod/checkout/db
  - address: vault.kv.mount
    id: secret
flags:
  secretsValidated: false
