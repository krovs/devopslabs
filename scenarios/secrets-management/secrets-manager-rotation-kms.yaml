id: secretsManagerRotationKms
kind: secrets
title: Secrets Manager Rotation and KMS
description: A production database secret uses the default KMS key and has rotation disabled.
primaryFile: secret-config.json
tips:
  - Describe the secret before editing.
  - Production database credentials should use the customer managed key.
  - Rotation should be enabled on a 30 day schedule.
files:
  "secret-config.json": |
    {
      "name": "prod/db/password",
      "kmsKeyId": "alias/aws/secretsmanager",
      "rotationEnabled": false,
      "rotationDays": 90
    }
  "policy-notes.md": |
    Required:
    - Use alias/prod-secrets-kms
    - Enable rotation
    - Rotate every 30 days
solution:
  summary: |
    A production database secret uses the default KMS key and has rotation disabled.
  steps:
    - Describe the secret before editing.
    - Production database credentials should use the customer managed key.
    - Rotation should be enabled on a 30 day schedule.
  explanation: |
    A production database secret uses the default KMS key and has rotation disabled.
    
    The secret path, resource policy, KMS setting, or rotation configuration now matches the intended access pattern. The solved path covers aws secretsmanager describe-secret.
    
    Operationally, this matters because applications consume secrets from the right boundary without exposing broader secret material.
  outcome: |
    Secrets Manager Rotation and KMS: The secret path, resource policy, KMS setting, or rotation configuration now matches the intended access pattern.
  focusFileName: secret-config.json
  files:
    "secret-config.json": |
      { "name": "prod/db/password", "kmsKeyId": "alias/prod-secrets-kms", "rotationEnabled": true, "rotationDays": 30 }
  commands:
    - aws secretsmanager describe-secret
backend:
  bucket: secrets-training
  key: secrets-manager-rotation-kms
  table: none
  locked: false
  lockId: null
awsResources:
  - type: secret
    name: prod/db/password
    id: arn:aws:secretsmanager:eu-west-1:123456789012:secret:prod/db/password
    status: failed
    note: Secret uses default KMS key and rotation is disabled.
stateResources:
  - address: kms.key
    id: alias/prod-secrets-kms
  - address: rotation.lambda
    id: rotate-prod-db-password
flags:
  secretsValidated: false
