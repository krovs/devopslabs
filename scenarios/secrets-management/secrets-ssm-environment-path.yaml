id: secretsSsmEnvironmentPath
kind: secrets
title: SSM Parameter Environment Path
description: A staging service reads the production database password parameter.
primaryFile: app-config.yaml
tips:
  - Check which parameter path the app uses.
  - The service runs in staging.
  - Keep decryption enabled, but point to the staging parameter path.
files:
  "app-config.yaml": |
    service: checkout-api
    environment: staging
    databasePasswordParameter: /prod/checkout/db/password
    withDecryption: true
  "parameters.txt": |
    /staging/checkout/db/password
    /prod/checkout/db/password
solution:
  summary: |
    A staging service reads the production database password parameter.
  steps:
    - Check which parameter path the app uses.
    - The service runs in staging.
    - Keep decryption enabled, but point to the staging parameter path.
  explanation: |
    A staging service reads the production database password parameter.
    
    The secret path, resource policy, KMS setting, or rotation configuration now matches the intended access pattern. The solved path covers aws ssm get-parameter.
    
    Operationally, this matters because applications consume secrets from the right boundary without exposing broader secret material.
  outcome: |
    SSM Parameter Environment Path: The secret path, resource policy, KMS setting, or rotation configuration now matches the intended access pattern.
  focusFileName: app-config.yaml
  replacements:
    - fileName: app-config.yaml
      search: |
        /prod/checkout/db/password
      replace: |
        /staging/checkout/db/password
  commands:
    - aws ssm get-parameter
backend:
  bucket: secrets-training
  key: ssm-environment-path
  table: none
  locked: false
  lockId: null
awsResources:
  - type: ssm_parameter
    name: /staging/checkout/db/password
    id: arn:aws:ssm:eu-west-1:123456789012:parameter/staging/checkout/db/password
    status: failed
    note: Staging service is configured to read the production parameter.
stateResources:
  - address: service
    id: checkout-api
  - address: environment
    id: staging
flags:
  secretsValidated: false
