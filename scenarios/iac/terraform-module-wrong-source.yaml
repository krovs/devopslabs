id: terraformModuleWrongSource
title: Terraform Module Wrong Source Path
description: Terraform init fails because the root module points at a module directory that does not exist.
primaryFile: main.tf
tips:
  - Run terraform init to see where Terraform is looking for the child module.
  - The file tabs show the real module path is modules/network/main.tf.
  - Fix the module source path in main.tf.
  - Run terraform init again after correcting source.
  - A clean plan completes the lab.
files:
  "main.tf": |
    terraform {
      backend "s3" {
        bucket         = "tf-state-training"
        key            = "modules/network.tfstate"
        region         = "eu-west-1"
        dynamodb_table = "tf-locks"
      }
    }

    provider "aws" {
      region = "eu-west-1"
    }

    module "network" {
      source = "./module/network"
      name   = "training-network"
    }
  "modules/network/main.tf": |
    variable "name" {
      type = string
    }

    resource "aws_vpc" "this" {
      cidr_block = "10.40.0.0/16"

      tags = {
        Name = var.name
      }
    }
solution:
  summary: |
    Terraform init fails because the root module points at a module directory that does not exist.
  steps:
    - Run terraform init to see where Terraform is looking for the child module.
    - The file tabs show the real module path is modules/network/main.tf.
    - Fix the module source path in main.tf.
    - Run terraform init again after correcting source.
    - A clean plan completes the lab.
  explanation: |
    Terraform Module Wrong Source Path is complete because the final state now addresses the original failure: Terraform init fails because the root module points at a module directory that does not exist.
    
    Key takeaway: A clean plan completes the lab. In a real platform team, this prevents plans that appear clean while code, state, and cloud resources still disagree.
  outcome: |
    Terraform Module Wrong Source Path: Terraform can now initialize, validate, and plan from a state/code view that matches the intended infrastructure change.
  focusFileName: main.tf
  replacements:
    - fileName: main.tf
      search: |
        source = "./module/network"
      replace: |
        source = "./modules/network"
  commands:
    - terraform init
    - terraform plan
backend:
  bucket: tf-state-training
  key: modules/network.tfstate
  table: tf-locks
  locked: false
  lockId: null
awsResources:
  - type: module
    name: modules/network
    id: ./modules/network
    status: failed
    note: Root module points at ./module/network instead of ./modules/network.
stateResources: []
flags:
  initialized: false
  cleanPlan: false
  validationPassed: false
