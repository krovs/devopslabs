id: interruptedApplyLock
title: Interrupted Apply With Lock
description: An apply died mid-run. The S3 bucket exists, state missed it, and the DynamoDB lock is still present.
tips:
  - Start by initializing Terraform so commands can inspect the configured backend.
  - The backend status says the state is locked. Query the fake DynamoDB lock table to get the lock ID.
  - Unlock the state with terraform force-unlock before attempting plan or import.
  - The bucket already exists in AWS but is missing from state. Import aws_s3_bucket.logs with the bucket name.
  - A clean terraform plan is the final confirmation.
files:
  "main.tf": |
    terraform {
      backend "s3" {
        bucket         = "tf-state-training"
        key            = "prod/app.tfstate"
        region         = "eu-west-1"
        dynamodb_table = "tf-locks"
      }
    }

    provider "aws" {
      region = "eu-west-1"
    }

    resource "aws_s3_bucket" "logs" {
      bucket = "prod-logs-training"
    }
solution:
  summary: |
    An apply died mid-run. The S3 bucket exists, state missed it, and the DynamoDB lock is still present.
  steps:
    - Start by initializing Terraform so commands can inspect the configured backend.
    - The backend status says the state is locked. Query the fake DynamoDB lock table to get the lock ID.
    - Unlock the state with terraform force-unlock before attempting plan or import.
    - The bucket already exists in AWS but is missing from state. Import aws_s3_bucket.logs with the bucket name.
    - A clean terraform plan is the final confirmation.
  explanation: |
    Interrupted Apply With Lock is complete because the final state now addresses the original failure: An apply died mid-run. The S3 bucket exists, state missed it, and the DynamoDB lock is still present.
    
    Key takeaway: A clean terraform plan is the final confirmation. In a real platform team, this prevents plans that appear clean while code, state, and cloud resources still disagree.
  outcome: |
    Interrupted Apply With Lock: Terraform can now initialize, validate, and plan from a state/code view that matches the intended infrastructure change.
  commands:
    - terraform init
    - aws dynamodb scan --table-name tf-locks
    - terraform force-unlock b9f3b20f-apply-crash
    - terraform import aws_s3_bucket.logs prod-logs-training
    - terraform plan
backend:
  bucket: tf-state-training
  key: prod/app.tfstate
  table: tf-locks
  locked: true
  lockId: b9f3b20f-apply-crash
awsResources:
  - type: s3_bucket
    name: prod-logs-training
    id: prod-logs-training
    status: exists
    note: Created before apply crashed.
stateResources: []
flags:
  initialized: false
  importedBucket: false
  cleanPlan: false
