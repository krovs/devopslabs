id: terragruntMissingInclude
kind: terragrunt
title: Terragrunt Missing Root Include
description: A live app stack does not inherit the root remote state and shared inputs because include is missing.
primaryFile: live/dev/app/terragrunt.hcl
tips:
  - Run terragrunt validate to inspect the live app stack.
  - The child terragrunt.hcl should include the root configuration.
  - Add include "root" with path = find_in_parent_folders().
  - Run terragrunt validate and terragrunt plan again.
files:
  "terragrunt.hcl": |
    remote_state {
      backend = "s3"
      config = {
        bucket         = "tf-state-training"
        key            = "${path_relative_to_include()}/terraform.tfstate"
        region         = "eu-west-1"
        dynamodb_table = "tf-locks"
      }
    }

    inputs = {
      environment = "dev"
      owner       = "platform"
    }
  "live/dev/app/terragrunt.hcl": |
    terraform {
      source = "../../../modules/app"
    }

    inputs = {
      name = "orders-api"
    }
  "modules/app/main.tf": |
    variable "name" {
      type = string
    }

    variable "environment" {
      type = string
    }

    resource "aws_s3_bucket" "app" {
      bucket = "${var.environment}-${var.name}-artifacts"
    }
solution:
  summary: |
    A live app stack does not inherit the root remote state and shared inputs because include is missing.
  steps:
    - Run terragrunt validate to inspect the live app stack.
    - The child terragrunt.hcl should include the root configuration.
    - Add include "root" with path = find_in_parent_folders().
    - Run terragrunt validate and terragrunt plan again.
  explanation: |
    A live app stack does not inherit the root remote state and shared inputs because include is missing.
    
    The Terragrunt stack can initialize, validate, and plan with the intended source, include, dependency, or formatting state. The solved path covers terragrunt init, terragrunt validate, and terragrunt plan.
    
    Operationally, this matters because stack composition problems are fixed in the live configuration rather than hidden by one-off local changes.
  outcome: |
    Terragrunt Missing Root Include: The Terragrunt stack can initialize, validate, and plan with the intended source, include, dependency, or formatting state.
  focusFileName: live/dev/app/terragrunt.hcl
  files:
    "live/dev/app/terragrunt.hcl": |
      include "root" {
        path = find_in_parent_folders()
      }
      
      terraform {
        source = "../../../modules/app"
      }
      
      inputs = {
        name = "orders-api"
      }
  commands:
    - terragrunt init
    - terragrunt validate
    - terragrunt plan
backend:
  bucket: tf-state-training
  key: live/dev/app/terraform.tfstate
  table: tf-locks
  locked: false
  lockId: null
awsResources:
  - type: stack
    name: live/dev/app
    id: app-stack
    status: failed
    note: Stack does not inherit remote_state or the shared environment input.
stateResources: []
flags:
  initialized: false
  cleanPlan: false
  validationPassed: false
