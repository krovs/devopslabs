id: supplyChainSyftGrypeVulnGate
kind: supplychain
title: Syft Grype Vulnerability Gate
description: An image scan finds a CVE; rebuild on a distroless base image and add a narrow, justified scanner exception.
primaryFile: scan.json
tips:
  - Run grype scan checkout-api:2.5.0 to see the vulnerability findings.
  - The scan blocks the gate due to a CVE in the current base image.
  - Read the scan-result.txt for the recommended fix.
  - Edit scan.json: change the baseImage and enable the justified exception.
files:
  "scan.json": |
    {
      "image": "checkout-api:2.5.0",
      "baseImage": "ubuntu:22.04",
      "ignoreJustified": false,
      "gate": "blocked"
    }
  "scan-result.txt": |
    image: checkout-api:2.5.0
    baseImage: ubuntu:22.04
    finding: CVE in shell utilities
    recommendation: change baseImage to distroless, set ignoreJustified to true
    gate: blocked
  "runbook.md": |
    Goal:
    - Pass the vulnerability gate for checkout-api:2.5.0.

    Constraints:
    - grype scan reveals a blocked gate with CVE findings.
    - Read scan-result.txt for the fix details.
    - Edit scan.json to change baseImage and enable the justified exception.
    - Re-run grype scan after the changes.
solution:
  summary: |
    The scan gate is blocked by a CVE in the ubuntu base image. Rebuild on a distroless base and add a narrow, justified exception so the gate passes.
  steps:
    - Run grype scan to see the blocked gate and failing CVE.
    - Read scan-result.txt for the recommended values.
    - Set baseImage to distroless and ignoreJustified to true in scan.json.
    - Run grype scan again to confirm the gate passes.
  explanation: |
    Fat base images carry packages that trigger vulnerability gates. A distroless base removes unused attack surface, and a narrow, justified exception documents the accepted residual risk so the gate can pass honestly.
  outcome: |
    The image is rebuilt on distroless with a justified exception and the gate passes.
  focusFileName: scan.json
  replacements:
    - fileName: scan.json
      search: '"baseImage": "ubuntu:22.04",'
      replace: '"baseImage": "distroless",'
    - fileName: scan.json
      search: '"ignoreJustified": false,'
      replace: '"ignoreJustified": true,'
    - fileName: scan.json
      search: '"gate": "blocked"'
      replace: '"gate": "passed"'
  commands:
    - grype scan checkout-api:2.5.0
    - check
backend:
  bucket: supply-chain
  key: syft-grype-vuln-gate
  table: none
  locked: false
  lockId: null
awsResources:
  - type: image_scan
    name: checkout-api-2.5.0
    id: checkout-api-2.5.0
    status: failed
    note: CVE in ubuntu base image; no justified exception and gate blocked.
stateResources:
  - address: scan.baseImage
    id: ubuntu:22.04
  - address: scan.gate
    id: blocked
flags:
  supplyChainValidated: false
