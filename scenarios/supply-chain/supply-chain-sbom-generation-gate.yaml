id: supplyChainSbomGenerationGate
kind: supplychain
title: SBOM Generation Gate
description: A release is blocked because the CI pipeline does not produce a CycloneDX SBOM. Generate one to unblock the gate.
primaryFile: release.json
tips:
  - Run syft check release checkout-api:2.5.0 to see the gate status.
  - The release gate is blocked because no CycloneDX SBOM is present.
  - "Generate an SBOM with: syft generate checkout-api:2.5.0 -o cyclonedx"
  - Run syft check release again to confirm the gate passes.
files:
  "release.json": |
    {
      "release": "checkout-api-2.5.0",
      "sbomPresent": false,
      "gate": "blocked"
    }
  "runbook.md": |
    Goal:
    - Unblock the release gate for checkout-api:2.5.0.

    Constraints:
    - The CI pipeline requires a CycloneDX SBOM before release.
    - Run syft check release to inspect the current gate state.
    - Generate the SBOM using syft.
    - Confirm the gate passes before running check.
solution:
  summary: |
    The release gate blocks deploys until a CycloneDX SBOM is produced.
  steps:
    - Run syft check release checkout-api:2.5.0 to confirm the gate is blocked and no SBOM exists.
    - Run syft generate checkout-api:2.5.0 -o cyclonedx to produce sbom.cdx.json.
    - Run syft check release checkout-api:2.5.0 to confirm the gate passes.
  explanation: |
    In a real CI pipeline, syft scans the container image and writes a CycloneDX SBOM file. The release gate detects the SBOM and unblocks deployment. The lab simulates this: syft generate creates sbom.cdx.json, and the gate transitions from blocked to passed.
  outcome: |
    sbom.cdx.json is generated, the release gate passes, and checkout-api:2.5.0 is clear for deployment.
  focusFileName: release.json
  replacements: []
  commands:
    - syft check release checkout-api:2.5.0
    - syft generate checkout-api:2.5.0 -o cyclonedx
    - syft check release checkout-api:2.5.0
    - check
backend:
  bucket: supply-chain
  key: sbom-generation-gate
  table: none
  locked: false
  lockId: null
awsResources:
  - type: release_gate
    name: checkout-api-2.5.0
    id: checkout-api-2.5.0
    status: failed
    note: Release blocked; no CycloneDX SBOM generated.
stateResources:
  - address: release.sbomPresent
    id: "false"
  - address: release.gate
    id: blocked
flags:
  supplyChainValidated: false
