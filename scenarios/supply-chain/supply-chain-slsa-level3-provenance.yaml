id: supplyChainSlsaLevel3Provenance
kind: supplychain
title: SLSA Level 3 Provenance Check
description: Build provenance attestation is missing the builder identity; fix the workflow and verify with slsa-verifier.
primaryFile: provenance.json
tips:
  - Run slsa-verifier verify-image ghcr.io/acme/checkout-api:2.5.0 to check provenance.
  - The verifier rejects the attestation because the builder identity is empty.
  - Read provenance-policy.txt to find the required values.
  - Set the builder identity and SLSA level in provenance.json to match the policy.
files:
  "provenance.json": |
    {
      "artifact": "checkout-api:2.5.0",
      "builderId": "",
      "slsaLevel": 0,
      "verifier": "slsa-verifier"
    }
  "provenance-policy.txt": |
    artifact: checkout-api:2.5.0
    requiredBuilderId: github-actions
    requiredSlsaLevel: 3
    verifier: slsa-verifier
    current: builderId empty, slsaLevel 0
  "runbook.md": |
    Goal:
    - Get slsa-verifier to accept the provenance attestation.
    
    Constraints:
    - The attestation is missing the builder identity and has the wrong SLSA level.
    - provenance-policy.txt defines the required builder and SLSA level.
    - Edit provenance.json to match the policy requirements.
    - Run slsa-verifier verify-image again.
solution:
  summary: |
    The provenance attestation is missing the builder identity and SLSA level. Set the builder to github-actions and the level to 3 so slsa-verifier accepts it.
  steps:
    - Run slsa-verifier to see the rejected attestation.
    - Read provenance-policy.txt for the required builder and level.
    - Set builderId to github-actions to identify the build platform.
    - Set slsaLevel to 3 to meet the provenance requirement.
    - Run slsa-verifier again to confirm acceptance.
  explanation: |
    SLSA level 3 requires a provenance attestation with a verified builder identity. Without the builderId, slsa-verifier cannot confirm the artifact came from the trusted workflow, so the release is rejected.
  outcome: |
    The attestation carries builder github-actions and SLSA level 3 and slsa-verifier accepts it.
  focusFileName: provenance.json
  replacements:
    - fileName: provenance.json
      search: '"builderId": "",'
      replace: '"builderId": "github-actions",'
    - fileName: provenance.json
      search: '"slsaLevel": 0'
      replace: '"slsaLevel": 3'
  commands:
    - slsa-verifier verify-image ghcr.io/acme/checkout-api:2.5.0
    - check
backend:
  bucket: supply-chain
  key: slsa-level3-provenance
  table: none
  locked: false
  lockId: null
awsResources:
  - type: provenance
    name: checkout-api-2.5.0
    id: checkout-api-2.5.0
    status: failed
    note: Provenance attestation missing builderId and SLSA level below 3.
stateResources:
  - address: provenance.builderId
    id: empty
  - address: provenance.slsaLevel
    id: "0"
flags:
  supplyChainValidated: false
