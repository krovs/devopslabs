id: githubActionsMissingSecret
kind: cicd
title: GitHub Actions Missing AWS Secret
description: A deploy workflow fails because the AWS role secret required by OIDC is not configured in the repository.
primaryFile: .github/workflows/deploy.yml
tips:
  - Inspect the latest failed run before editing the workflow.
  - The workflow expects AWS_ROLE_ARN from repository secrets.
  - List repository secrets to confirm whether AWS_ROLE_ARN exists.
  - Add the missing secret with gh secret set AWS_ROLE_ARN.
  - Re-run the workflow and inspect the run result.
files:
  ".github/workflows/deploy.yml": |
    name: deploy

    on:
      push:
        branches: [main]

    permissions:
      id-token: write
      contents: read

    jobs:
      deploy:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: aws-actions/configure-aws-credentials@v4
            with:
              role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
              aws-region: eu-west-1
          - run: terraform init
          - run: terraform apply -auto-approve
solution:
  summary: |
    A deploy workflow fails because the AWS role secret required by OIDC is not configured in the repository.
  steps:
    - Inspect the latest failed run before editing the workflow.
    - The workflow expects AWS_ROLE_ARN from repository secrets.
    - List repository secrets to confirm whether AWS_ROLE_ARN exists.
    - Add the missing secret with gh secret set AWS_ROLE_ARN.
    - Re-run the workflow and inspect the run result.
  explanation: |
    GitHub Actions Missing AWS Secret is complete because the final state now addresses the original failure: A deploy workflow fails because the AWS role secret required by OIDC is not configured in the repository.
    
    Key takeaway: Re-run the workflow and inspect the run result. In a real platform team, this prevents pipeline reruns that hide the actual workflow, secret, path, or permission problem.
  outcome: |
    GitHub Actions Missing AWS Secret: The workflow now fails or passes for the right reason, with the underlying path, secret, permission, or gate fixed instead of bypassed.
  commands:
    - gh secret set AWS_ROLE_ARN
    - gh run rerun
backend:
  bucket: github-actions
  key: deploy.yml
  table: repository-secrets
  locked: false
  lockId: null
awsResources:
  - type: workflow
    name: deploy
    id: run-1042
    status: failed
    note: configure-aws-credentials cannot read secrets.AWS_ROLE_ARN.
stateResources:
  - address: secret.AWS_REGION
    id: eu-west-1
flags:
  secretsConfigured: false
  runPassing: false
