id: prGithubActionsWriteAllReview
kind: pr
title: PR Review GitHub Actions Write-All
description: Review a workflow change that broadens repository token permissions for an AWS deployment.
primaryFile: .github/workflows/deploy.yml.diff
tips:
  - Check the permissions block before looking at deploy commands.
  - AWS OIDC does not require write-all.
  - The correct review should request changes and call out the overbroad token scope.
files:
  ".github/workflows/deploy.yml.diff": |
    diff --git a/.github/workflows/deploy.yml b/.github/workflows/deploy.yml
    index 356eb20..c56de98 100644
    --- a/.github/workflows/deploy.yml
    +++ b/.github/workflows/deploy.yml
    @@ -5,9 +5,8 @@ on:
         branches: [main]

     permissions:
    -  id-token: write
    -  contents: read
    +  write-all

     jobs:
       deploy:
         runs-on: ubuntu-latest
  "review-notes.md": |
    Request context:
    - Workflow deploys to AWS using GitHub OIDC.
    - Repository policy requires explicit minimal permissions.
    - id-token: write and contents: read are sufficient.
solution:
  summary: |
    Review a workflow change that broadens repository token permissions for an AWS deployment.
  steps:
    - Check the permissions block before looking at deploy commands.
    - AWS OIDC does not require write-all.
    - The correct review should request changes and call out the overbroad token scope.
  explanation: |
    PR Review GitHub Actions Write-All is complete because the final state now addresses the original failure: Review a workflow change that broadens repository token permissions for an AWS deployment.
    
    Key takeaway: The correct review should request changes and call out the overbroad token scope. In a real platform team, this prevents risky changes being approved because review findings focus on context instead of the actual blast radius.
  outcome: |
    PR Review GitHub Actions Write-All: The review now blocks the risky change with the right decision and findings while leaving harmless context unflagged.
  apply: prReview
  commands:
    - Select the expected review decision
    - Select only required findings
    - Submit review
