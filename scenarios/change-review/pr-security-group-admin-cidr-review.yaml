id: prSecurityGroupAdminCidrReview
kind: pr
title: PR Review Security Group Admin CIDR
description: Review a Terraform change that opens admin ingress to the internet to unblock maintenance access.
primaryFile: terraform/security-group.tf.diff
tips:
  - Compare the proposed CIDR with the maintenance access requirement.
  - The port is not the only risk; source scope matters.
  - The correct review should request changes and identify the internet CIDR.
files:
  "terraform/security-group.tf.diff": |
    diff --git a/terraform/security-group.tf b/terraform/security-group.tf
    index 83fd110..a0b38c1 100644
    --- a/terraform/security-group.tf
    +++ b/terraform/security-group.tf
    @@ -12,7 +12,7 @@ resource "aws_security_group_rule" "admin_https" {
       protocol          = "tcp"
       from_port         = 8443
       to_port           = 8443
    -  cidr_blocks       = ["203.0.113.0/24"]
    +  cidr_blocks       = ["0.0.0.0/0"]
       security_group_id = aws_security_group.admin.id
     }
  "review-notes.md": |
    Request context:
    - Maintenance access should come only from the corporate VPN CIDR 203.0.113.0/24.
    - The admin service listens on TCP 8443.
    - Internet-wide admin access is not acceptable.
