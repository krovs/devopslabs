id: iamGithubOidcEnvironmentTrust
kind: iam
title: IAM GitHub OIDC Environment Trust
description: A production deploy role accepts too many GitHub OIDC subjects. Lock it to the production environment.
primaryFile: trust-policy.json
tips:
  - The workflow deploys through the production environment.
  - Keep the audience condition set to sts.amazonaws.com.
  - The subject should use environment:production, not a wildcard.
  - Do not trust every branch in the repository.
files:
  "trust-policy.json": |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Principal": {
            "Federated": "arn:aws:iam::123456789012:oidc-provider/token.actions.githubusercontent.com"
          },
          "Action": "sts:AssumeRoleWithWebIdentity",
          "Condition": {
            "StringEquals": {
              "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
            },
            "StringLike": {
              "token.actions.githubusercontent.com:sub": "repo:acme/platform:*"
            }
          }
        }
      ]
    }
  ".github/workflows/deploy.yml": |
    name: deploy

    on:
      workflow_dispatch:

    permissions:
      id-token: write
      contents: read

    jobs:
      deploy:
        environment: production
        runs-on: ubuntu-latest
        steps:
          - uses: aws-actions/configure-aws-credentials@v4
            with:
              role-to-assume: arn:aws:iam::123456789012:role/prod-deploy
              aws-region: eu-west-1
backend:
  bucket: iam-training
  key: github-oidc-environment-trust
  table: none
  locked: false
  lockId: null
awsResources:
  - type: iam_role
    name: prod-deploy
    id: arn:aws:iam::123456789012:role/prod-deploy
    status: failed
    note: Trust policy accepts any subject from repo acme/platform.
stateResources:
  - address: oidc.provider
    id: token.actions.githubusercontent.com
  - address: github.environment
    id: production
flags:
  iamValidated: false
