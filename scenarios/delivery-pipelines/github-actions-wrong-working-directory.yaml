id: githubActionsWrongWorkingDirectory
kind: cicd
title: GitHub Actions Wrong Working Directory
description: A Terraform validation workflow fails because it runs from the wrong folder.
primaryFile: .github/workflows/terraform-check.yml
tips:
  - Inspect the failed run output to find the command that fails.
  - The repository resources view shows the Terraform code is under infra/dev.
  - The workflow currently uses infra/prod as the working directory.
  - Change the workflow working-directory to infra/dev.
  - Re-run the workflow and verify the latest run is passing.
files:
  ".github/workflows/terraform-check.yml": |
    name: terraform-check

    on:
      pull_request:
        branches: [main]

    jobs:
      validate:
        runs-on: ubuntu-latest
        defaults:
          run:
            working-directory: infra/prod
        steps:
          - uses: actions/checkout@v4
          - uses: hashicorp/setup-terraform@v3
          - run: terraform fmt -check
          - run: terraform init
          - run: terraform validate
solution:
  summary: |
    A Terraform validation workflow fails because it runs from the wrong folder.
  steps:
    - Inspect the failed run output to find the command that fails.
    - The repository resources view shows the Terraform code is under infra/dev.
    - The workflow currently uses infra/prod as the working directory.
    - Change the workflow working-directory to infra/dev.
    - Re-run the workflow and verify the latest run is passing.
  explanation: |
    A Terraform validation workflow fails because it runs from the wrong folder.
    
    The workflow or pipeline now contains the required configuration and the rerun succeeds for the intended reason. The solved path covers workflow rerun.
    
    Operationally, this matters because pipeline failures point to real delivery problems instead of missing secrets, wrong paths, weak permissions, or incomplete auth setup.
  outcome: |
    GitHub Actions Wrong Working Directory: The workflow or pipeline now contains the required configuration and the rerun succeeds for the intended reason.
  focusFileName: .github/workflows/terraform-check.yml
  replacements:
    - fileName: .github/workflows/terraform-check.yml
      search: |
        working-directory: infra/prod
      replace: |
        working-directory: infra/dev
  commands:
    - gh run rerun
backend:
  bucket: github-actions
  key: terraform-check.yml
  table: workflow-runs
  locked: false
  lockId: null
awsResources:
  - type: workflow
    name: terraform-check
    id: run-2187
    status: failed
    note: infra/prod does not exist in this repository.
stateResources:
  - address: path.infra/dev
    id: Terraform root module
  - address: path.infra/prod
    id: missing
flags:
  workflowFixed: false
  runPassing: false
