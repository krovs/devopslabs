id: githubActionsEnvironmentApproval
kind: cicd
title: GitHub Actions Environment Approval
description: A production deploy workflow cannot reach the protected approval gate because the job targets an environment named prod, while the repository only protects production.
primaryFile: .github/workflows/prod-deploy.yml
tips:
  - gh run view shows the job targets environment prod.
  - The repository has a protected environment named production.
  - prod and production are different GitHub environments.
  - Change only environment.name from prod to production.
  - Re-run the workflow.
files:
  ".github/workflows/prod-deploy.yml": |
    name: prod-deploy

    on:
      workflow_dispatch:

    jobs:
      deploy:
        runs-on: ubuntu-latest
        environment:
          name: prod
        steps:
          - uses: actions/checkout@v4
          - run: ./deploy.sh
solution:
  summary: |
    The workflow is not waiting on the real production approval gate. It created or targeted prod instead of the protected production environment.
  steps:
    - gh run view shows the job targets environment prod.
    - Repository context shows the protected environment is production.
    - prod and production are different GitHub environments.
    - Change only environment.name from prod to production.
    - Re-run the workflow.
  explanation: |
    GitHub Actions Environment Approval is complete because the deploy job now targets the protected production environment instead of an unprotected or missing prod environment.
    
    Key takeaway: GitHub environment names are exact. A short alias like prod can bypass the intended approval model or fail because the expected protected environment is named production.
  outcome: |
    The next run reaches the intended production approval gate and no longer targets the wrong environment name.
  focusFileName: .github/workflows/prod-deploy.yml
  replacements:
    - fileName: .github/workflows/prod-deploy.yml
      search: |
          name: prod
      replace: |
          name: production
  commands:
    - gh run rerun
backend:
  bucket: github-actions
  key: prod-deploy.yml
  table: workflow-runs
  locked: false
  lockId: null
awsResources:
  - type: workflow
    name: prod-deploy
    id: run-6303
    status: failed
    note: The workflow targets prod, but only production is configured as a protected environment.
stateResources:
  - address: environment.production
    id: protected
  - address: environment.prod
    id: missing
flags:
  workflowFixed: false
  runPassing: false
