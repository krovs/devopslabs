id: githubActionsNodeCachePath
kind: cicd
title: GitHub Actions Node Cache Path
description: A Node.js CI workflow fails before tests because npm ci cannot find the lockfile in the configured working directory.
primaryFile: .github/workflows/node-ci.yml
tips:
  - Run gh run view and inspect the failed command.
  - The repository paths show package-lock.json is under app/.
  - The workflow runs npm ci from the repository root.
  - Set defaults.run.working-directory to app.
  - Re-run the workflow.
files:
  ".github/workflows/node-ci.yml": |
    name: node-ci

    on:
      pull_request:
        branches: [main]

    jobs:
      test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-node@v4
            with:
              node-version: 20
              cache: npm
          - run: npm ci
          - run: npm test
solution:
  summary: |
    A Node.js CI workflow fails before tests because npm ci cannot find the lockfile in the configured working directory.
  steps:
    - Run gh run view and inspect the failed command.
    - The repository paths show package-lock.json is under app/.
    - The workflow runs npm ci from the repository root.
    - Set defaults.run.working-directory to app.
    - Re-run the workflow.
  explanation: |
    A Node.js CI workflow fails before tests because npm ci cannot find the lockfile in the configured working directory.
    
    The workflow or pipeline now contains the required configuration and the rerun succeeds for the intended reason. The solved path covers workflow rerun.
    
    Operationally, this matters because pipeline failures point to real delivery problems instead of missing secrets, wrong paths, weak permissions, or incomplete auth setup.
  outcome: |
    GitHub Actions Node Cache Path: The workflow or pipeline now contains the required configuration and the rerun succeeds for the intended reason.
  focusFileName: .github/workflows/node-ci.yml
  replacements:
    - fileName: .github/workflows/node-ci.yml
      search: |
        runs-on: ubuntu-latest
            steps:
      replace: |
        runs-on: ubuntu-latest
            defaults:
              run:
                working-directory: app
            steps:
  commands:
    - gh run rerun
backend:
  bucket: github-actions
  key: node-ci.yml
  table: workflow-runs
  locked: false
  lockId: null
awsResources:
  - type: workflow
    name: node-ci
    id: run-6101
    status: failed
    note: npm ci runs from the repository root, but the Node app lives in app/.
stateResources:
  - address: path.app/package-lock.json
    id: present
  - address: path.package-lock.json
    id: missing
flags:
  workflowFixed: false
  runPassing: false
