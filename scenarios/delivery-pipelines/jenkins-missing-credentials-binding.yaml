id: jenkinsMissingCredentialsBinding
kind: cicd
title: Jenkins Missing Credentials Binding
description: A Jenkins image publish stage fails because docker login runs without binding the registry credentials.
primaryFile: Jenkinsfile
tips:
  - Inspect the failed build log with jenkins build log.
  - The failing command is docker login ghcr.io.
  - Check the Jenkins credential inventory file for the GHCR credential id.
  - The credential id is ghcr-push.
  - Bind username and password variables before docker login.
  - Rebuild the pipeline.
files:
  "Jenkinsfile": |
    pipeline {
      agent any

      stages {
        stage('Publish image') {
          steps {
            sh 'docker build -t ghcr.io/acme/app:${BUILD_NUMBER} .'
            sh 'docker login ghcr.io'
            sh 'docker push ghcr.io/acme/app:${BUILD_NUMBER}'
          }
        }
      }
    }
  "jenkins/credentials.md": |
    Jenkins folder: platform-delivery

    Available credentials:
    - id: ghcr-push
      kind: usernamePassword
      scope: folder
      purpose: Push images to ghcr.io/acme/app

    Notes:
    - Use usernameVariable REGISTRY_USER.
    - Use passwordVariable REGISTRY_TOKEN.
    - Do not hardcode registry tokens in Jenkinsfile.
solution:
  summary: |
    docker login is running without credentials, so the publish stage cannot authenticate to GHCR.
  steps:
    - Inspect the Jenkins build output with jenkins build log.
    - Confirm docker login is the failing command.
    - Open jenkins/credentials.md to identify the GHCR credential id.
    - Wrap login and push in withCredentials using credential id ghcr-push.
    - Pipe the password into docker login with --password-stdin.
    - Rebuild the pipeline with jenkins rebuild.
  explanation: |
    Jenkins does not expose credentials to shell steps unless the pipeline binds them explicitly. The fix scopes the registry username and token only around the login and push commands.

    This is safer than hardcoding tokens in the Jenkinsfile and makes the publish stage repeatable on every agent.
  outcome: |
    The publish stage authenticates to ghcr.io with the Jenkins credential and can push the image.
  focusFileName: Jenkinsfile
  replacements:
    - fileName: Jenkinsfile
      search: |
                sh 'docker login ghcr.io'
                sh 'docker push ghcr.io/acme/app:${BUILD_NUMBER}'
      replace: |
                withCredentials([usernamePassword(credentialsId: 'ghcr-push', usernameVariable: 'REGISTRY_USER', passwordVariable: 'REGISTRY_TOKEN')]) {
                  sh 'echo "$REGISTRY_TOKEN" | docker login ghcr.io -u "$REGISTRY_USER" --password-stdin'
                  sh 'docker push ghcr.io/acme/app:${BUILD_NUMBER}'
                }
  commands:
    - jenkins build log
    - jenkins rebuild
backend:
  bucket: jenkins
  key: Jenkinsfile
  table: builds
  locked: false
  lockId: null
awsResources:
  - type: pipeline
    name: publish-image
    id: build-118
    status: failed
    note: docker login runs without a bound GHCR username or token.
stateResources:
  - address: credential.ghcr-push
    id: available
  - address: registry.ghcr.io
    id: requires-auth
flags:
  workflowFixed: false
  runPassing: false
