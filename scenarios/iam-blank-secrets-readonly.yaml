id: iamBlankSecretsReadonly
kind: iam
title: IAM Blank Secrets Read Only
description: Build a least-privilege policy from a blank file so an app can read exactly one production secret.
primaryFile: policy.json
tips:
  - The app only needs GetSecretValue.
  - Scope Resource to the production database password secret.
  - Do not use secretsmanager:* or Resource "*".
files:
  "policy.json": |
    {}
  "request.txt": |
    Build an IAM policy that allows:
    - secretsmanager:GetSecretValue
    - Resource arn:aws:secretsmanager:eu-west-1:123456789012:secret:prod/db/password-abc123
    It must not allow:
    - secretsmanager:DeleteSecret
    - secretsmanager:*
    - Resource *
solution:
  summary: |
    Build a least-privilege policy from a blank file so an app can read exactly one production secret.
  steps:
    - The app only needs GetSecretValue.
    - Scope Resource to the production database password secret.
    - Do not use secretsmanager:* or Resource "*".
  explanation: |
    IAM Blank Secrets Read Only is complete because the final state now addresses the original failure: Build a least-privilege policy from a blank file so an app can read exactly one production secret.
    
    Key takeaway: Do not use secretsmanager:* or Resource "*". In a real platform team, this prevents access that works only because the policy is broader than the request actually needs.
  outcome: |
    IAM Blank Secrets Read Only: The access path now grants only the requested capability with the required principal, resource, and condition boundaries.
  focusFileName: policy.json
  files:
    "policy.json": |
      { "Version": "2012-10-17", "Statement": [{ "Effect": "Allow", "Action": "secretsmanager:GetSecretValue", "Resource": "arn:aws:secretsmanager:eu-west-1:123456789012:secret:prod/db/password-abc123" }] }
  commands:
    - check
backend:
  bucket: iam-training
  key: blank-secrets-readonly
  table: none
  locked: false
  lockId: null
awsResources:
  - type: iam_policy
    name: app-prod-db-secret-read
    id: arn:aws:iam::123456789012:policy/app-prod-db-secret-read
    status: failed
    note: Blank policy has not been authored yet.
stateResources:
  - address: iam.role
    id: payments-api
  - address: secret
    id: arn:aws:secretsmanager:eu-west-1:123456789012:secret:prod/db/password-abc123
flags:
  iamValidated: false
