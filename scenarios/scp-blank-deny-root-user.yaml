id: scpBlankDenyRootUser
kind: scp
title: SCP Blank Deny Root User
description: Build an SCP from a blank policy that denies root-user actions while preserving a billing exception.
primaryFile: scp.json
tips:
  - Start from the requirement notes, not from an existing policy.
  - SCP Deny statements can match root users with aws:PrincipalArn.
  - Keep a billing exception so account teams can still view billing data.
files:
  "scp.json": |
    {}
  "request.txt": |
    Build an SCP that:
    - Denies actions when aws:PrincipalArn matches arn:aws:iam::*:root
    - Keeps aws-portal:ViewBilling available
    - Uses an explicit Deny statement
solution:
  summary: |
    Build an SCP from a blank policy that denies root-user actions while preserving a billing exception.
  steps:
    - Start from the requirement notes, not from an existing policy.
    - SCP Deny statements can match root users with aws:PrincipalArn.
    - Keep a billing exception so account teams can still view billing data.
  explanation: |
    SCP Blank Deny Root User is complete because the final state now addresses the original failure: Build an SCP from a blank policy that denies root-user actions while preserving a billing exception.
    
    Key takeaway: Keep a billing exception so account teams can still view billing data. In a real platform team, this prevents organization guardrails that either over-block valid operations or leave risky exceptions unmanaged.
  outcome: |
    SCP Blank Deny Root User: The organization guardrail now enforces the intended deny behavior without breaking the documented exception path.
  focusFileName: scp.json
  files:
    "scp.json": |
      { "Version": "2012-10-17", "Statement": [{ "Effect": "Deny", "Action": ["ec2:TerminateInstances", "s3:DeleteBucket", "aws-portal:ViewBilling"], "Resource": "arn:aws:iam::*:root", "Condition": { "StringLike": { "aws:PrincipalArn": "arn:aws:iam::*:root" } } }] }
  commands:
    - check
