id: oidcDeploymentThreatModel
kind: threatmodel
title: OIDC Deployment Threat Model
description: A GitHub Actions OIDC deployment design is missing STRIDE coverage for repository identity, workflow integrity, artifact provenance, and production role scope.
primaryFile: threat-model.md
tips:
  - Start with architecture.md and follow the token exchange into AWS STS.
  - Treat GitHub repository identity and AWS role trust as a Spoofing risk.
  - The workflow file and deployment artifact can both be tampered with.
  - Production deploy permissions should be constrained to the service being released.
  - Choose concrete mitigations that a delivery or platform team could enforce.
files:
  "architecture.md": |
    # OIDC Deployment Data Flow

    Components:
    - A developer pushes a change to the GitHub repository.
    - GitHub Actions starts the deployment workflow from the repository branch.
    - The workflow requests an OIDC token from the GitHub OIDC provider.
    - AWS STS exchanges the token for the production deploy role.
    - The workflow publishes an immutable deployment artifact.
    - The production environment deploys the signed artifact.

    Trust boundaries:
    - Developer workstation to source control.
    - GitHub workflow identity to AWS cloud identity.
    - CI artifact publishing to production deployment.

    Security assumptions:
    - AWS trusts GitHub OIDC claims instead of long-lived AWS keys.
    - Production deploys are limited to the protected production environment.
    - Artifacts must be traceable to the reviewed source commit.
  "threat-model.md": |
    # OIDC Deployment Threat Model

    | Area | STRIDE | Threat | Mitigation |
    | --- | --- | --- | --- |
    | GitHub OIDC subject | Spoofing | TODO | TODO |
    | Deploy workflow | Tampering | TODO | TODO |
    | Deployment artifact | Tampering | TODO | TODO |
    | Production environment | Elevation of Privilege | TODO | TODO |
  "runbook.md": |
    Goal:
    - Complete the missing STRIDE entries for the OIDC production deployment path.

    Constraints:
    - Tie each threat to a real data flow in architecture.md.
    - Cover repository identity, workflow integrity, artifact provenance, and production role scope.
    - Prefer enforceable controls such as OIDC claim restrictions, protected branches, artifact signing, and least-privilege IAM.
    - Do not answer with generic STRIDE definitions.
solution:
  summary: |
    The deployment design names OIDC and production deployment components, but the threat model does not capture concrete abuse cases or controls.
  steps:
    - Read architecture.md and identify the trust boundaries between GitHub and AWS.
    - Fill the Spoofing row with an untrusted branch or fork obtaining a deploy token and restrict OIDC trust claims as the mitigation.
    - Fill the workflow Tampering row with malicious workflow changes and protected branch review controls as the mitigation.
    - Fill the artifact Tampering row with artifact substitution and signing or provenance verification as the mitigation.
    - Fill the Elevation of Privilege row with an overbroad deploy role and least-privilege IAM plus environment approval as the mitigation.
    - Run threatmodel review.
  explanation: |
    OIDC removes long-lived cloud keys, but the security boundary moves to repository identity, workflow permissions, token claims, and production role scope. A useful threat model records who can mint the token, who can change the workflow, how artifacts are trusted, and what the assumed role can change.
  outcome: |
    The deployment threat model covers repository identity, workflow tampering, artifact provenance, and production least privilege with concrete mitigations.
  apply: threatModelControls
  focusFileName: threat-model.md
  commands:
    - threatmodel review
