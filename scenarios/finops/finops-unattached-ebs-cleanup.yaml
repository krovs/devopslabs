id: finopsUnattachedEbsCleanup
kind: finops
title: Unattached EBS Cleanup
description: An old unattached EBS volume is still accruing storage cost because cleanup is disabled.
primaryFile: volume-cleanup.json
tips:
  - Inspect unattached volume inventory before changing cleanup.
  - Snapshot before deleting old unattached volumes.
  - Only delete volumes that have been unattached for at least 14 days.
files:
  "volume-cleanup.json": |
    {
      "volumeId": "vol-0abc123",
      "state": "available",
      "unattachedDays": 41,
      "minimumUnattachedDays": 30,
      "snapshotBeforeDelete": false,
      "deleteUnattached": false
    }
  "cost-notes.md": |
    Required:
    - minimumUnattachedDays: 14
    - snapshotBeforeDelete: true
    - deleteUnattached: true
solution:
  summary: |
    An old unattached EBS volume is still accruing storage cost because cleanup is disabled.
  steps:
    - Inspect unattached volume inventory before changing cleanup.
    - Snapshot before deleting old unattached volumes.
    - Only delete volumes that have been unattached for at least 14 days.
  explanation: |
    An old unattached EBS volume is still accruing storage cost because cleanup is disabled.
    
    The cost-control setting now targets the waste source without removing required workload capability. The solved path covers aws ec2 describe-volumes.
    
    Operationally, this matters because spend reduction is tied to an explainable resource lifecycle or architecture change.
  outcome: |
    Unattached EBS Cleanup: The cost-control setting now targets the waste source without removing required workload capability.
  focusFileName: volume-cleanup.json
  files:
    "volume-cleanup.json": |
      { "volumeId": "vol-0abc123", "state": "available", "unattachedDays": 41, "minimumUnattachedDays": 14, "snapshotBeforeDelete": true, "deleteUnattached": true }
  commands:
    - aws ec2 describe-volumes
backend:
  bucket: finops-training
  key: unattached-ebs-cleanup
  table: none
  locked: false
  lockId: null
awsResources:
  - type: ebs_volume
    name: vol-0abc123
    id: vol-0abc123
    status: failed
    note: Unattached EBS volume remains available and billable.
stateResources:
  - address: volume
    id: vol-0abc123
  - address: owner
    id: platform
flags:
  finopsValidated: false
